name: Process Excel data

on:
  repository_dispatch:
    types:
      - excel-uploaded
  push:
    paths:
      - 'scripts/process-data.ts'
      - 'scripts/audit-processed-data.mjs'
      - 'scripts/verify-source-data.mjs'
      - 'lib/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: process-excel-data
  cancel-in-progress: false

jobs:
  process-data:
    if: github.event_name != 'push' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run process:data
      - run: npm run audit:data
      - run: npm run verify:source
      - name: Commit processed JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/raw data/processed
          git diff --cached --quiet || git commit -m "chore(data): process Excel upload"
          git push
