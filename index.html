      function setActiveTab(tabId) {
        document.querySelectorAll('.tab').forEach((button) => button.classList.toggle('active', button.dataset.tab === tabId));
        document.querySelectorAll('.section').forEach((element) => element.classList.toggle('active', element.id === tabId));
        document.getElementById('page-title').textContent = pageTitles[tabId] || 'Огляд';
      }

      async function loadData() {
        try {
          const response = await fetch('data/processed/dashboard.json', { cache: 'no-store' });
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          state.data = await response.json();
        } catch (error) {
          document.getElementById('overview').innerHTML = `<div class="empty"><strong>Не вдалося завантажити data/processed/dashboard.json.</strong><br>На GitHub Pages це працює одразу. Якщо відкриваєте локально і браузер блокує file:// fetch, запустіть будь-який статичний сервер: <code>python3 -m http.server</code>.</div>`;
          document.getElementById('updated').textContent = `Помилка завантаження даних: ${error.message}`;
          return;
        }

        state.data.sales = Array.isArray(state.data.sales) ? state.data.sales : [];
        state.data.groupPlans = Array.isArray(state.data.groupPlans) ? state.data.groupPlans : [];
        state.data.receivables = Array.isArray(state.data.receivables) ? state.data.receivables : [];
        state.data.monthlyPlans = Array.isArray(state.data.monthlyPlans) ? state.data.monthlyPlans : [];
        syncSearchSuggestions();

        const months = [...new Set(state.data.sales.map((row) => monthOf(row.date)).filter((month) => /^\d{4}-\d{2}$/.test(month)))].sort().reverse();
        const expectedSource = 'data/raw/Олексієнко.xlsx';
        const sourcePattern = /^data\/raw\/Олексієнко(?:_\d{2}\.\d{2}-\d{2}\.\d{2})?\.xlsx?$/;
        const sourceFiles = state.data.meta?.sourceFiles || [];

        if (state.data.status === 'ok' && !sourceFiles.some((file) => sourcePattern.test(file))) {
          document.getElementById('updated').textContent = 'Помилка джерела даних';
          document.querySelectorAll('.section').forEach((element) => {
            element.innerHTML = `<div class="empty"><strong>Неправильне джерело істини.</strong><br>Processed JSON має будуватися тільки з <code>${expectedSource}</code> або архівного <code>Олексієнко_DD.MM-DD.MM.xlsx</code>. Зараз sourceFiles: <code>${escapeHtml(sourceFiles.join(', ') || 'не вказані')}</code>.</div>`;
          });
          return;
        }

        if (!state.data.sales.length || !months.length) {
          const message = state.data.message || 'Немає sales rows, отриманих з Excel. UI не показує demo/fallback дані.';
          document.getElementById('updated').textContent = 'Немає оброблених Excel-даних';
          document.querySelectorAll('.section').forEach((element) => {
            element.innerHTML = `<div class="empty"><strong>Немає даних з Excel.</strong><br>${escapeHtml(message)}<br><br>Додайте <code>data/raw/Олексієнко.xlsx</code> і запустіть <code>npm run process:data</code>.</div>`;
          });
          return;
        }

        state.month = months[0];
        const monthSelect = document.getElementById('month');
        monthSelect.innerHTML = months.map((month) => `<option value="${month}">${month}</option>`).join('');
        monthSelect.value = state.month;
        state.grossPlan = state.data.monthlyPlans.find((plan) => plan.month === state.month)?.grossPlan || 0;
        state.salesTodos = loadSalesTodos();
        document.getElementById('grossPlan').value = state.grossPlan;
        document.getElementById('updated').textContent = state.data.updatedAt ? `Дані оновлено: ${new Date(state.data.updatedAt).toLocaleString('uk-UA')}` : 'Дані завантажено з Excel';
        renderAll();
      }

      document.addEventListener('click', (event) => {
        const searchSuggestion = event.target.closest('[data-search-suggestion]');
        if (searchSuggestion) {
          state.search = searchSuggestion.dataset.searchSuggestion || '';
          document.getElementById('search').value = state.search;
          state.searchSuggestionsOpen = false;
          renderSearchSuggestions();
          renderAll();
          return;
        }

        const todoSuggest = event.target.closest('[data-sales-todo-suggest]');
        if (todoSuggest) {
          try {
            const payload = JSON.parse(todoSuggest.dataset.salesTodoSuggest || '{}');
            addSalesTodo(payload);
            renderTodo();
          } catch {
            return;
          }
          return;
        }

        const todoSubmit = event.target.closest('[data-sales-todo-submit]');
        if (todoSubmit) {
          if (String(state.salesTodoDraft.title || '').trim()) {
            addSalesTodo({
              title: state.salesTodoDraft.title,
              clientName: state.salesTodoDraft.clientName,
              tags: parseTodoTags(state.salesTodoDraft.tags),
              priority: state.salesTodoDraft.priority
            });
            state.salesTodoDraft = { title: '', clientName: '', tags: '', priority: 'medium' };
            renderTodo();
          }
          return;
        }

        const todoStatus = event.target.closest('[data-sales-todo-status]');
        if (todoStatus) {
          const id = todoStatus.dataset.salesTodoStatus;
          state.salesTodos = state.salesTodos.map((todo) => todo.id === id ? { ...todo, status: nextTodoStatus(todo.status) } : todo);
          saveSalesTodos();
          renderTodo();
          return;
        }

        const todoDelete = event.target.closest('[data-sales-todo-delete]');
        if (todoDelete) {
          const id = todoDelete.dataset.salesTodoDelete;
          state.salesTodos = state.salesTodos.filter((todo) => todo.id !== id);
          saveSalesTodos();
          renderTodo();
          return;
        }

        const todoTag = event.target.closest('[data-sales-todo-tag]');
        if (todoTag) {
          const tag = todoTag.dataset.salesTodoTag || 'all';
          state.salesTodoFilters.tag = state.salesTodoFilters.tag === tag ? 'all' : tag;
          renderTodo();
          return;
        }

        if (state.searchSuggestionsOpen && !event.target.closest('.search-wrap')) {
          state.searchSuggestionsOpen = false;
          renderSearchSuggestions();
        }

        const filterOpen = event.target.closest('[data-table-filter-open]');
        if (filterOpen) {
          const tableId = filterOpen.dataset.tableFilterOpen;
          const filterKey = filterOpen.dataset.filterKey;
          state.filterPanelQuery = '';
          state.openFilterPanel = state.openFilterPanel?.tableId === tableId && state.openFilterPanel?.filterKey === filterKey
            ? null
            : { tableId, filterKey };
          renderAll();
          return;
        }

        const filterOption = event.target.closest('[data-table-filter-option]');
        if (filterOption) {
          const tableId = filterOption.dataset.tableFilterOption;
          const filterKey = filterOption.dataset.filterKey;
          const filterValue = filterOption.dataset.filterValue;
          const current = new Set(state.tableFilters[tableId]?.[filterKey] || []);
          if (current.has(filterValue)) current.delete(filterValue);
          else current.add(filterValue);
          state.tableFilters[tableId] = { ...(state.tableFilters[tableId] || {}), [filterKey]: [...current] };
          renderAll();
          return;
        }

        const filterClear = event.target.closest('[data-table-filter-clear]');
        if (filterClear) {
          const tableId = filterClear.dataset.tableFilterClear;
          const filterKey = filterClear.dataset.filterKey;
          state.tableFilters[tableId] = { ...(state.tableFilters[tableId] || {}), [filterKey]: [] };
          renderAll();
          return;
        }

        const filterClearAll = event.target.closest('[data-table-filter-clear-all]');
        if (filterClearAll) {
          const tableId = filterClearAll.dataset.tableFilterClearAll;
          state.tableFilters[tableId] = {};
          state.openFilterPanel = null;
          renderAll();
          return;
        }

        const filterChipRemove = event.target.closest('[data-filter-chip-remove]');
        if (filterChipRemove) {
          const tableId = filterChipRemove.dataset.filterChipRemove;
          const filterKey = filterChipRemove.dataset.filterKey;
          const filterValue = filterChipRemove.dataset.filterValue;
          state.tableFilters[tableId] = {
            ...(state.tableFilters[tableId] || {}),
            [filterKey]: (state.tableFilters[tableId]?.[filterKey] || []).filter((value) => value !== filterValue)
          };
          renderAll();
          return;
        }

        if (state.openFilterPanel && !event.target.closest('[data-table-filter-root="true"]')) {
          state.openFilterPanel = null;
          renderAll();
          return;
        }

        const sortButton = event.target.closest('[data-table-sort]');
        if (!sortButton) return;
        const tableId = sortButton.dataset.tableSort;
        const sortKey = sortButton.dataset.sortKey;
        const current = state.tableSorts[tableId] || {};
        state.tableSorts[tableId] = {
          key: sortKey,
          dir: current.key === sortKey && current.dir === 'asc' ? 'desc' : 'asc'
        };
        renderAll();
      });

      document.addEventListener('click', (event) => {
        const rowToggle = event.target.closest('[data-row-toggle]');
        if (!rowToggle) return;
        const tableId = rowToggle.dataset.rowToggle;
        const rowKey = rowToggle.dataset.rowKey;
        const key = rowExpansionKey(tableId, rowKey);
        state.expandedRows[key] = !state.expandedRows[key];
        renderAll();
      });

      document.addEventListener('click', (event) => {
        const groupGapModeButton = event.target.closest('[data-group-gap-mode]');
        if (!groupGapModeButton) return;
        state.groupGapMode = groupGapModeButton.dataset.groupGapMode;
        renderOverview();
      });

      document.addEventListener('mousemove', (event) => {
        const tooltipTarget = event.target.closest('[data-tooltip-title], [data-tooltip-body]');
        if (!tooltipTarget) {
          hideChartTooltip();
          return;
        }
        showChartTooltip(tooltipTarget, event.clientX, event.clientY);
      });

      document.addEventListener('mouseout', (event) => {
        const source = event.target.closest('[data-tooltip-title], [data-tooltip-body]');
        if (!source) return;
        const related = event.relatedTarget?.closest?.('[data-tooltip-title], [data-tooltip-body]');
        if (related) return;
        hideChartTooltip();
      });

      document.querySelectorAll('.tab').forEach((button) => button.addEventListener('click', () => {
        setActiveTab(button.dataset.tab);
      }));

      document.querySelectorAll('[data-search-mode]').forEach((button) => button.addEventListener('click', () => {
        state.searchMode = button.dataset.searchMode;
        document.querySelectorAll('[data-search-mode]').forEach((item) => item.classList.remove('active'));
        button.classList.add('active');
        state.searchSuggestionsOpen = true;
        syncSearchSuggestions();
        renderAll();
      }));

      document.getElementById('month').addEventListener('change', (event) => {
        state.month = event.target.value;
        state.grossPlan = state.data.monthlyPlans.find((plan) => plan.month === state.month)?.grossPlan || 0;
        document.getElementById('grossPlan').value = state.grossPlan;
        renderAll();
      });
      document.getElementById('grossPlan').addEventListener('input', (event) => {
        state.grossPlan = Number(event.target.value || 0);
        renderAll();
      });
      document.getElementById('search').addEventListener('input', (event) => {
        state.search = event.target.value;
        state.searchSuggestionsOpen = true;
        renderSearchSuggestions();
        renderAll();
      });
      document.getElementById('search').addEventListener('focus', () => {
        state.searchSuggestionsOpen = true;
        renderSearchSuggestions();
      });
      document.addEventListener('input', (event) => {
        const todoDraftInput = event.target.closest('[data-sales-todo-draft]');
        if (todoDraftInput) {
          const field = todoDraftInput.dataset.salesTodoDraft;
          state.salesTodoDraft[field] = todoDraftInput.value;
          return;
        }

        const todoFilterInput = event.target.closest('[data-sales-todo-filter]');
        if (todoFilterInput) {
          const field = todoFilterInput.dataset.salesTodoFilter;
          state.salesTodoFilters[field] = todoFilterInput.value;
          renderTodo();
          return;
        }

        const filterInput = event.target.closest('[data-filter-panel-search]');
        if (!filterInput) return;
        state.filterPanelQuery = filterInput.value;
        renderAll();
      });

      loadData();
    </script>
  </body>
</html>
