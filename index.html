<!doctype html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CargoTP Панель</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #101318;
        --bg-elevated: #151a22;
        --bg-top: #0c1016;
        --card: #151a22;
        --card-2: #1a202a;
        --card-3: #202735;
        --ink: #f4f7fb;
        --muted: #9aa7b8;
        --muted-strong: #c4ceda;
        --line: rgba(148, 163, 184, 0.16);
        --line-strong: rgba(96, 165, 250, 0.34);
        --accent: #3b82f6;
        --accent-soft: rgba(59, 130, 246, 0.14);
        --neutral-accent: #7f8ea3;
        --amber: #f2b84b;
        --red: #ef6b63;
        --green: #66c187;
        --lime: #9bd672;
        --shadow: 0 10px 24px rgba(0, 0, 0, 0.18);
        --shadow-soft: none;
        --radius-panel: 4px;
        --radius-control: 4px;
        --radius-pill: 999px;
        --content-max: 1760px;
      }
      * { box-sizing: border-box; }
      html { background: var(--bg-top); }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font-family: "IBM Plex Sans", "Avenir Next", "Segoe UI Variable", "Segoe UI", sans-serif;
        text-rendering: optimizeLegibility;
        background-image: none;
      }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after { animation: none !important; transition-duration: 0ms !important; }
      }
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
      }
      a { color: inherit; }
      .app-shell {
        min-height: 100vh;
        background: var(--bg);
      }
      .content-shell {
        min-width: 0;
        position: relative;
        overflow: hidden;
        background: transparent;
      }
      .sidebar {
        display: none;
        position: sticky;
        top: 0;

        padding: 16px 10px;
        border-right: 1px solid var(--line);
        background: #121212;

      .sidebar-title,

      }
      .sidebar-stack {

        justify-content: center;

        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.08em;
      }
      .sidebar-nav {

        gap: 8px;

        justify-items: center;
      }
      .sidebar-footer {

        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
      }
      .rail-status-dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: var(--green);
        box-shadow: 0 0 0 3px rgba(104, 176, 127, 0.14);
      }
      main {
        padding: 18px 18px 28px;
        width: min(100%, var(--content-max));
        margin: 0 auto;
      }
      .mobile-nav {
        position: sticky;
        top: 0;
        z-index: 15;
        display: block;
        padding: 12px 12px 10px;
        border-bottom: 1px solid var(--line);
        background: rgba(17, 17, 17, 0.96);
      }
      .mobile-nav-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 12px;
      }
      .mobile-tabs { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; }
      button, select, input, textarea { font: inherit; }
      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
      .signal-chip {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 6px 12px;
        background: var(--card-2);
        color: var(--muted);
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: .1em;

      .tab {

        justify-content: center;

        border: 1px solid var(--line);
        background: #202020;
        color: var(--muted);
        border-radius: var(--radius-control);
        padding: 11px 12px;
        cursor: pointer;
        text-align: left;
        transition: transform 160ms ease, border-color 160ms ease, background-color 160ms ease, color 160ms ease;
      }
      .tab-icon {
        width: 16px;
        height: 16px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: currentColor;
        flex: 0 0 auto;
      }
      .tab-icon svg {
        width: 16px;
        height: 16px;
        display: block;
        stroke: currentColor;
      }
      .tab-label { white-space: nowrap; }
      .tab:hover {
        border-color: var(--line-strong);
        background: #252525;
        transform: translateY(-1px);
      }
      .tab.active {
        background: #ffffff;
        border-color: #ffffff;
        color: #111111;
      }
      .rail-tab {
        position: relative;
        width: 46px;
        height: 46px;
        padding: 0;
      }
      .rail-tab .tab-label { display: none; }
      .rail-tab::after {
        content: attr(data-label);
        position: absolute;
        left: calc(100% + 10px);
        top: 50%;
        transform: translateY(-50%);

        border-radius: 4px;
        border: 1px solid var(--line);
        background: #111111;
        color: white;
        font-size: 12px;
        font-weight: 700;
        white-space: nowrap;
        opacity: 0;
        pointer-events: none;
        transition: opacity 140ms ease;
      }
      .rail-tab:hover::after { opacity: 1; }
      .page-header {

        flex-wrap: wrap;
        align-items: end;
        justify-content: space-between;

      .page-header-stat {
        min-width: 0;
        padding: 10px 11px;
        border: 1px solid var(--line);
        border-radius: var(--radius-control);

      }
      .page-header-stat-label {
        color: var(--muted);
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .page-header-stat-value {
        margin-top: 6px;
        color: white;
        font-size: 15px;
        font-weight: 680;
        letter-spacing: -0.01em;
      }
      .page-header-stat-copy {
        margin-top: 4px;
        color: var(--muted);
        font-size: 11px;
      }
      .toolbar {
        display: grid;
        position: relative;
        z-index: 40;
        isolation: isolate;
        overflow: visible;
        gap: 10px;
        margin: 12px 0 12px;
        border: 1px solid var(--line);
        border-radius: var(--radius-panel);
        padding: 12px 14px;
        background: transparent;
        box-shadow: none;
        transition: border-color 180ms ease, background-color 180ms ease;
        animation: fadeUp 420ms ease-out both;
      }
      .toolbar-grid {
        display: grid;
        gap: 12px;
        grid-template-columns: 210px minmax(0, 1fr) 210px;
      }
      .toolbar-head {
        display: flex;
        align-items: start;
        justify-content: space-between;
        gap: 12px;
      }
      .toolbar-title {
        font-size: 13px;
        font-weight: 700;
        color: white;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }
      .toolbar-copy {
        margin-top: 4px;
        color: var(--muted);
        font-size: 11px;
      }
      .toolbar-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .toolbar label { display: grid; gap: 7px; color: var(--muted); font-size: 11px; font-weight: 700; flex: 1 1 220px; min-width: 0; text-transform: uppercase; letter-spacing: 0.08em; }
      label { display: grid; gap: 6px; color: var(--muted); font-size: 13px; }
      input, select, textarea {
        border: 1px solid var(--line);
        border-radius: var(--radius-control);
        background: #181818;
        color: var(--ink);
        padding: 11px 13px;
        min-width: 0;
        width: 100%;
        box-shadow: none;
        transition: border-color 140ms ease, background-color 140ms ease, box-shadow 140ms ease;
      }
      textarea {
        resize: vertical;
        min-height: 112px;
      }
      input:hover, select:hover, textarea:hover { border-color: var(--line-strong); }
      input:focus-visible, select:focus-visible, textarea:focus-visible, button:focus-visible {
        outline: none;
        border-color: rgba(255, 255, 255, 0.34);
        box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.08);
      }
      select {
        appearance: none;
        padding-right: 3rem;
      }
      .mode-pills { display: flex; flex-wrap: wrap; gap: 8px; }
      .mode-pill {
        border: 1px solid var(--line);
        border-radius: var(--radius-control);
        background: #202020;
        color: var(--muted);
        padding: 10px 14px;
        font-size: 13px;
        font-weight: 700;
        transition: transform 160ms ease, border-color 160ms ease, background-color 160ms ease, color 160ms ease;
      }
      .mode-pill:hover {
        border-color: var(--line-strong);
        transform: translateY(-1px);
      }
      .mode-pill.active {
        border-color: white;
        background: white;
        color: #111111;
      }
      .segment-control {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 3px;
        border: 1px solid var(--line);
        border-radius: var(--radius-control);
        background: #181818;
      }
      .segment-btn {
        border: 0;
        border-radius: calc(var(--radius-control) - 2px);
        background: transparent;
        color: var(--muted);
        padding: 8px 10px;
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        cursor: pointer;
        transition: background-color 140ms ease, color 140ms ease;
      }
      .segment-btn:hover {
        color: white;
        background: #202020;
      }
      .segment-btn.is-active {
        background: white;
        color: #111111;
      }
      .search-wrap { position: relative; z-index: 80; }
      .search-suggestions {
        position: absolute;
        left: 0;
        right: 0;
        top: calc(100% + 8px);
        z-index: 120;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: var(--radius-control);
        background: #111111;
        box-shadow: var(--shadow);
      }
      .search-suggestions-grid {
        display: grid;
        gap: 8px;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        max-height: 18rem;
        overflow: auto;
      }
      .search-suggestion {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: var(--radius-control);
        background: var(--card-2);
        color: var(--ink);
        padding: 9px 10px;
        text-align: left;
        font-size: 13px;
        cursor: pointer;
        transition: border-color 140ms ease, background-color 140ms ease;
      }
      .search-suggestion:hover {
        border-color: var(--line-strong);
        background: #262626;
      }
      h1 { margin: 6px 0 4px; font-size: clamp(24px, 3.4vw, 34px); font-weight: 680; letter-spacing: -0.02em; }
      h2 { margin: 0; font-size: 20px; font-weight: 680; letter-spacing: -0.01em; }
      .muted { color: var(--muted); }
      .section { display: none; }
      .section.active { display: block; }
      .section-stack { display: grid; gap: 12px; }
      .section-head { display: grid; gap: 6px; }
      .grid { display: grid; gap: 10px; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
      .two-up { display: grid; gap: 12px; grid-template-columns: minmax(0, 1.58fr) minmax(360px, 1fr); }
      .three-up { display: grid; gap: 12px; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }
      .overview-kpis .kpi:first-child { grid-column: span 2; }
      .overview-hero {
        display: grid;
        gap: 12px;
        grid-template-columns: minmax(0, 1.4fr) minmax(360px, 0.92fr);
      }
      .hero-panel,
      .action-panel {
        border: 1px solid var(--line);
        border-radius: calc(var(--radius-panel) + 2px);
        background: transparent;
        box-shadow: none;
      }
      .hero-panel {
        padding: 14px;
      }
      .hero-head,
      .action-head {
        display: flex;
        align-items: start;
        justify-content: space-between;
        gap: 12px;
      }
      .hero-kicker,
      .action-kicker {
        color: var(--muted);
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }
      .hero-title,
      .action-title {
        margin-top: 6px;
        color: white;
        font-size: 21px;
        font-weight: 700;
        letter-spacing: -0.02em;
      }
      .hero-copy,
      .action-copy {
        margin-top: 6px;
        color: var(--muted);
        font-size: 11px;
        line-height: 1.45;
        max-width: 40ch;
      }
      .hero-chip {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 7px 11px;
        border-radius: var(--radius-control);
        border: 1px solid var(--line);
        background: #1f1f1f;
        color: var(--muted-strong);
        font-size: 11px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        white-space: nowrap;
      }
      .hero-grid {
        margin-top: 12px;
        display: grid;
        gap: 8px;
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
      .hero-stat {
        padding: 13px 13px 11px;
        border: 1px solid var(--line);
        border-radius: var(--radius-control);
        background: #1c1c1c;
      }
      .hero-stat-label {
        color: var(--muted);
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .hero-stat-value {
        margin-top: 7px;
        color: white;
        font-size: 20px;
        font-weight: 720;
        letter-spacing: -0.03em;
      }
      .hero-stat-copy {
        margin-top: 4px;
        color: var(--muted);
        font-size: 11px;
        line-height: 1.45;
      }
      .hero-stat-value.tone-success { color: var(--green); }
      .hero-stat-value.tone-warning { color: var(--amber); }
      .hero-stat-value.tone-danger { color: var(--red); }
      .action-panel {
        padding: 14px;
      }
      .action-stack {
        margin-top: 12px;
        display: grid;
        gap: 8px;
      }
      .action-item {
        display: grid;
        gap: 6px;
        padding: 13px 14px;
        border: 1px solid var(--line);
        border-radius: var(--radius-control);
        background: #1c1c1c;
      }
      .action-item-meta {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }
      .action-item-label {
        color: white;
        font-size: 14px;
        font-weight: 700;
      }
      .action-item-value {
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }
      .action-item-copy {
        color: var(--muted);
        font-size: 11px;
        line-height: 1.45;
      }
      .tone-success { color: var(--green); }
      .tone-warning { color: var(--amber); }
      .tone-danger { color: var(--red); }
      .tone-info { color: var(--accent); }
      .card {
        position: relative;
        isolation: isolate;
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: var(--radius-panel);
        padding: 13px;
        box-shadow: none;
        transition: transform 160ms ease, border-color 160ms ease, background-color 160ms ease, box-shadow 160ms ease;
        animation: fadeUp 420ms ease-out both;
      }
      .card:hover {
        z-index: 3;
        transform: translateY(-1px);
        border-color: var(--line-strong);
        box-shadow: none;
      }
      .kpi {
        position: relative;
        overflow: hidden;
        min-height: 112px;
        padding: 14px 14px 12px 16px;
      }
      .kpi::before {
        content: '';
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 2px;
        border-radius: 0;
        background: var(--kpi-accent, var(--accent));
      }
      .kpi::after {
        content: '';
        position: absolute;
        inset: 0;
        background: rgba(255,255,255,0.04);
        opacity: 0;
        transition: opacity 180ms ease;
        pointer-events: none;
      }
      .kpi:hover::after { opacity: 1; }
      .kpi .label { color: var(--muted); font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: .08em; max-width: 22ch; line-height: 1.35; }
      .kpi .value { margin-top: 12px; font-size: clamp(22px, 1.8vw, 28px); line-height: 1; font-weight: 700; color: white; letter-spacing: -0.03em; }
      .kpi .muted { margin-top: 8px; font-size: 11px; line-height: 1.45; max-width: 34ch; }
      .kpi.info { --kpi-accent: #ffffff; }
      .kpi.success { --kpi-accent: var(--green); }
      .kpi.warning { --kpi-accent: var(--amber); }
      .kpi.danger { --kpi-accent: var(--red); }
      .kpi.secondary { --kpi-accent: var(--neutral-accent); }
      .metric-strip {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 0;
        border: 1px solid var(--line);
        border-radius: var(--radius-panel);
        background: transparent;
        overflow: hidden;
        box-shadow: none;
      }
      .metric-strip-item {
        min-width: 0;
        padding: 13px 14px;
        border-right: 1px solid var(--line);
      }
      .metric-strip-item:last-child { border-right: 0; }
      .metric-strip-label {
        color: var(--muted);
        font-size: 11px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: .08em;
      }
      .metric-strip-value {
        margin-top: 8px;
        color: white;
        font-size: 20px;
        font-weight: 700;
        letter-spacing: -0.02em;
      }
      .metric-strip-copy {
        margin-top: 4px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.45;
      }
      .table-wrap { overflow-x: auto; overflow-y: visible; border: 1px solid var(--line); border-radius: var(--radius-panel); background: transparent; -webkit-overflow-scrolling: touch; touch-action: pan-x pan-y; box-shadow: none; cursor: grab; scrollbar-gutter: stable both-edges; scrollbar-width: thin; scrollbar-color: rgba(255, 255, 255, 0.28) rgba(255, 255, 255, 0.06); }
      .table-wrap.dragging { cursor: grabbing; user-select: none; }

      .table-wrap::-webkit-scrollbar-track { background: rgba(255,255,255,0.06); }
      .table-wrap::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.28); border-radius: 999px; }
      .table-wrap.tall { max-height: 30rem; overflow-y: auto; }
      table { width: 100%; border-collapse: collapse; font-size: 13px; }
      th, td { padding: 10px 12px; border-bottom: 1px solid var(--line); text-align: left; white-space: nowrap; }
      th { position: relative; }
      th { background: #1d1d1d; font-weight: 750; color: var(--ink); }
      td { color: var(--ink); }
      .table-wrap.tall th { position: sticky; top: 0; z-index: 1; }

      tbody tr {
        transition: background-color 140ms ease;
      }

        align-items: center;

        padding: 0;

        color: inherit;
      }
      .sort-mark { font-size: 12px; color: var(--muted); }
      .th-wrap { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
      .filter-trigger {

        align-items: center;
        gap: 6px;

        border: 1px solid var(--line);

        cursor: pointer;
      }

      }

        gap: 10px;

        background: #111111;

      }

        z-index: 90;
      }
