<!doctype html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CargoTP Dashboard</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #08101f;
        --bg-top: #0d1630;
        --card: rgba(13, 23, 42, 0.94);
        --card-2: rgba(18, 30, 53, 0.94);
        --ink: #e5eefc;
        --muted: #8da2c7;
        --line: rgba(148, 163, 184, 0.18);
        --line-strong: rgba(148, 163, 184, 0.32);
        --blue: #4ea1ff;
        --teal: #2dd4bf;
        --amber: #f59e0b;
        --violet: #8b5cf6;
        --red: #fb7185;
        --green: #34d399;
        --lime: #a3e635;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background:
          radial-gradient(circle at top left, rgba(78, 161, 255, 0.14), transparent 26%),
          radial-gradient(circle at top right, rgba(45, 212, 191, 0.12), transparent 24%),
          radial-gradient(circle at bottom right, rgba(245, 158, 11, 0.08), transparent 24%),
          var(--bg);
        color: var(--ink);
        font-family: "Avenir Next", "Segoe UI Variable", "Segoe UI", "Trebuchet MS", sans-serif;
      }
      .app-shell { min-height: 100vh; }
      .sidebar {
        display: none;
        position: sticky;
        top: 0;
        height: 100vh;
        padding: 24px 20px;
        border-right: 1px solid var(--line);
        background: rgba(6,12,24,.78);
        backdrop-filter: blur(18px);
      }
      .sidebar-brand {
        border: 1px solid var(--line);
        border-radius: 26px;
        padding: 18px;
        background: linear-gradient(180deg, rgba(13,23,42,0.92), rgba(9,16,30,0.92));
        box-shadow: 0 22px 60px rgba(0,0,0,.24);
      }
      .sidebar-brand strong { display: block; font-size: 24px; color: white; }
      .sidebar-brand span { display: block; margin-top: 6px; color: var(--muted); font-size: 13px; }
      .sidebar-title {
        margin: 24px 0 10px;
        color: var(--blue);
        letter-spacing: .12em;
        text-transform: uppercase;
        font-size: 11px;
        font-weight: 800;
      }
      .sidebar-nav { display: grid; gap: 8px; }
      .content-shell { min-width: 0; }
      main { padding: 18px 20px 22px; }
      .mobile-nav {
        position: sticky;
        top: 0;
        z-index: 15;
        display: flex;
        gap: 10px;
        align-items: center;
        justify-content: space-between;
        padding: 14px;
        border-bottom: 1px solid var(--line);
        background: rgba(6,12,24,.78);
        backdrop-filter: blur(16px);
      }
      .mobile-brand strong { display: block; color: white; font-size: 18px; }
      .mobile-brand span { display: block; color: var(--muted); font-size: 11px; }
      .mobile-tabs { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 2px; max-width: 68vw; }
      button, select, input { font: inherit; }
      .tab {
        border: 1px solid var(--line);
        background: rgba(10, 18, 33, 0.84);
        color: var(--muted);
        border-radius: 18px;
        padding: 12px 14px;
        cursor: pointer;
        text-align: left;
      }
      .tab.active {
        background: rgba(78,161,255,0.16);
        border-color: rgba(78,161,255,0.4);
        color: white;
        box-shadow: 0 14px 28px rgba(78, 161, 255, 0.12);
      }
      .page-header { display: flex; flex-wrap: wrap; align-items: end; justify-content: space-between; gap: 12px; margin-bottom: 18px; }
      .page-header h1 { margin: 0; }
      .toolbar {
        display: grid;
        gap: 14px;
        margin: 18px 0;
        border: 1px solid var(--line);
        border-radius: 24px;
        padding: 18px;
        background: linear-gradient(180deg, rgba(13, 23, 42, 0.9), rgba(10, 18, 33, 0.9));
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.26);
      }
      .toolbar-grid {
        display: grid;
        gap: 14px;
        grid-template-columns: 220px minmax(0, 1fr) auto;
      }
      .toolbar label { display: grid; gap: 6px; color: var(--muted); font-size: 13px; flex: 1 1 220px; min-width: 0; }
      label { display: grid; gap: 6px; color: var(--muted); font-size: 13px; }
      input, select {
        border: 1px solid var(--line);
        border-radius: 16px;
        background: rgba(8, 15, 28, 0.9);
        color: var(--ink);
        padding: 12px 14px;
        min-width: 0;
        width: 100%;
        box-shadow: inset 0 1px 2px rgba(15, 23, 42, 0.08);
      }
      .mode-pills { display: flex; flex-wrap: wrap; gap: 8px; }
      .mode-pill {
        border: 1px solid var(--line);
        border-radius: 999px;
        background: rgba(10, 18, 33, 0.82);
        color: var(--muted);
        padding: 10px 14px;
        font-size: 13px;
        font-weight: 700;
      }
      .mode-pill.active {
        border-color: rgba(78, 161, 255, 0.45);
        background: rgba(78,161,255,0.16);
        color: white;
        box-shadow: 0 14px 28px rgba(78, 161, 255, 0.12);
      }
      h1 { margin: 12px 0 4px; font-size: clamp(28px, 4vw, 42px); }
      h2 { margin: 0; font-size: 24px; }
      .muted { color: var(--muted); }
      .section { display: none; }
      .section.active { display: block; }
      .section-stack { display: grid; gap: 18px; }
      .section-head { display: grid; gap: 6px; }
      .grid { display: grid; gap: 14px; grid-template-columns: repeat(auto-fit, minmax(210px, 1fr)); }
      .two-up { display: grid; gap: 16px; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); }
      .three-up { display: grid; gap: 16px; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); }
      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 24px;
        padding: 18px;
        box-shadow: 0 24px 60px rgba(0, 0, 0, .26);
      }
      .kpi .label { color: var(--muted); font-size: 13px; }
      .kpi .value { margin-top: 8px; font-size: 26px; font-weight: 900; color: white; }
      .table-wrap { overflow-x: auto; overflow-y: visible; border: 1px solid var(--line); border-radius: 20px; background: linear-gradient(180deg, rgba(12,20,36,0.96), rgba(9,16,30,0.96)); -webkit-overflow-scrolling: touch; touch-action: pan-x pan-y; box-shadow: 0 20px 48px rgba(0, 0, 0, 0.24); }
      .table-wrap.tall { max-height: 30rem; overflow-y: auto; }
      table { width: 100%; border-collapse: collapse; font-size: 14px; }
      th, td { padding: 11px 12px; border-bottom: 1px solid var(--line); text-align: left; white-space: nowrap; }
      th { position: relative; }
      th { background: rgba(16, 28, 51, 0.95); font-weight: 750; color: var(--ink); }
      td { color: var(--ink); }
      .table-wrap.tall th { position: sticky; top: 0; z-index: 1; }
      tr:last-child td { border-bottom: 0; }
      .th-sort {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        border: 0;
        padding: 0;
        background: transparent;
        cursor: pointer;
        font: inherit;
        color: inherit;
      }
      .sort-mark { font-size: 12px; color: var(--muted); }
      .th-wrap { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
      .filter-trigger {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 5px 9px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: rgba(8, 15, 28, 0.72);
        color: var(--muted);
        font-size: 11px;
        font-weight: 700;
        cursor: pointer;
      }
      .filter-trigger.active {
        border-color: rgba(78, 161, 255, 0.45);
        background: rgba(78, 161, 255, 0.16);
        color: white;
      }
      .filter-menu {
        position: absolute;
        right: 10px;
        top: calc(100% + 10px);
        z-index: 20;
        width: 260px;
        display: grid;
        gap: 10px;
        padding: 12px;
        border-radius: 18px;
        border: 1px solid var(--line);
        background: rgba(8, 15, 28, 0.98);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.42);
      }
      .filter-menu-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; font-weight: 800; color: var(--blue); }
      .filter-clear {
        border: 0;
        background: transparent;
        color: var(--muted);
        font-size: 11px;
        font-weight: 700;
        cursor: pointer;
      }
      .filter-options { display: grid; gap: 6px; max-height: 260px; overflow: auto; }
      .filter-option {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: rgba(12, 20, 36, 0.95);
        color: var(--ink);
        padding: 9px 10px;
        text-align: left;
        font-size: 13px;
        cursor: pointer;
      }
      .filter-option.active {
        border-color: rgba(78, 161, 255, 0.45);
        background: rgba(78, 161, 255, 0.16);
      }
      .filter-summary { display: flex; flex-wrap: wrap; gap: 8px; }
      .filter-summary-chip {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 7px 10px;
        border-radius: 999px;
        border: 1px solid rgba(78, 161, 255, 0.38);
        background: rgba(78, 161, 255, 0.14);
        color: white;
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
      }
      .table-meta {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      .table-count {
        padding: 10px 14px;
        border-radius: 16px;
        border: 1px solid var(--line);
        background: rgba(8, 15, 28, 0.72);
        color: white;
        font-size: 13px;
      }
      .hint-inline { display: inline-flex; align-items: center; gap: 8px; }
      .hint-dot {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 16px;
        height: 16px;
        border-radius: 999px;
        border: 1px solid var(--line);
        font-size: 10px;
        font-weight: 700;
        color: var(--blue);
        background: rgba(78, 161, 255, 0.12);
      }
      .bar-list { display: grid; gap: 10px; }
      .bar-row { display: grid; grid-template-columns: minmax(120px, 220px) 1fr auto; gap: 10px; align-items: center; }
      .bar-bg { height: 12px; overflow: hidden; border-radius: 999px; background: rgba(148, 163, 184, 0.16); }
      .bar { height: 100%; border-radius: inherit; background: var(--blue); }
      .status-red { color: var(--red); font-weight: 800; }
      .status-green { color: var(--green); font-weight: 800; }
      .status-lime { color: var(--lime); font-weight: 900; }
      .danger { color: var(--red); }
      .ok { color: var(--green); }
      .empty { padding: 22px; border: 1px dashed var(--line); border-radius: 20px; background: rgba(10,18,33,0.9); color: var(--muted); }
      .small { font-size: 12px; color: var(--muted); }
      .pill { display: inline-block; padding: 4px 8px; border-radius: 999px; background: rgba(78, 161, 255, 0.14); color: #9ecbff; font-size: 12px; font-weight: 700; }
      .expandable-row { cursor: pointer; }
      .expandable-row:hover { background: rgba(78, 161, 255, 0.06); }
      .expand-card {
        display: grid;
        gap: 8px;
        padding: 14px 16px;
        border-radius: 14px;
        background: rgba(15, 25, 45, 0.92);
        border: 1px solid var(--line);
      }
      .chips { display: flex; flex-wrap: wrap; gap: 8px; }
      .chip {
        display: inline-flex;
        align-items: center;
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(78, 161, 255, 0.14);
        color: #9ecbff;
        font-size: 12px;
        font-weight: 700;
      }
      .pie-wrap { display: grid; gap: 18px; align-items: center; grid-template-columns: minmax(180px, 220px) 1fr; }
      .pie-chart {
        width: 200px;
        height: 200px;
        border-radius: 50%;
        position: relative;
        margin: 0 auto;
      }
      .pie-chart::after {
        content: "";
        position: absolute;
        inset: 32px;
        border-radius: 50%;
        background: rgba(10, 18, 33, 0.96);
        box-shadow: inset 0 0 0 1px rgba(148, 163, 184, 0.14);
      }
      .pie-center {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        z-index: 1;
      }
      .pie-center-stack { display: grid; gap: 4px; justify-items: center; line-height: 1.1; }
      .pie-center-value { color: white; font-size: 22px; font-weight: 900; }
      .pie-center-divider,
      .pie-center-label { color: var(--muted); font-size: 12px; font-weight: 700; }
      .legend-list { display: grid; gap: 10px; }
      .legend-item { display: grid; grid-template-columns: auto 1fr auto; gap: 10px; align-items: center; }
      .legend-dot { width: 12px; height: 12px; border-radius: 50%; }
      .chart-shell { display: grid; gap: 14px; }
      .chart-title { font-size: 15px; font-weight: 750; }
      .chart-legend { display: flex; flex-wrap: wrap; gap: 14px; font-size: 12px; color: var(--muted); }
      .chart-legend span { display: inline-flex; align-items: center; gap: 6px; }
      .legend-swatch { width: 10px; height: 10px; border-radius: 999px; display: inline-block; }
      .line-chart { width: 100%; height: 250px; }
      .line-chart text { font-size: 11px; fill: var(--muted); }
      .insight-grid { display: grid; gap: 14px; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
      .insight { border: 1px solid var(--line); border-radius: 20px; padding: 16px; background: var(--card-2); box-shadow: 0 16px 40px rgba(0, 0, 0, 0.2); }
      .insight .meta { color: var(--blue); font-size: 11px; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase; }
      .insight .big { margin-top: 8px; color: white; font-size: 28px; font-weight: 900; }
      .insight .copy { margin-top: 8px; font-size: 13px; color: var(--muted); }
      @media (min-width: 980px) {
        .app-shell { display: grid; grid-template-columns: 280px minmax(0, 1fr); }
        .sidebar { display: block; }
        .mobile-nav { display: none; }
        main { padding: 24px 24px 28px; }
      }
      @media (max-width: 979px) {
        .pie-wrap { grid-template-columns: 1fr; }
        .pie-chart { width: 180px; height: 180px; }
        main { padding: 14px 14px 20px; }
        .toolbar { gap: 10px; }
        .toolbar-grid { grid-template-columns: 1fr; }
        .table-meta { align-items: stretch; }
        .filter-menu { left: 10px; right: 10px; width: auto; }
        th, td { padding: 10px 10px; }
      }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="sidebar-brand">
          <strong>CargoTP</strong>
          <span>Sales dashboard</span>
        </div>
        <div class="sidebar-title">Меню</div>
        <nav class="sidebar-nav">
          <button class="tab active" data-tab="overview">Огляд</button>
          <button class="tab" data-tab="sales">Продажі</button>
          <button class="tab" data-tab="groups">План груп</button>
          <button class="tab" data-tab="receivables">Дебіторка</button>
          <button class="tab" data-tab="tires">Шини</button>
        </nav>
      </aside>

      <div class="content-shell">
        <div class="mobile-nav">
          <div class="mobile-brand">
            <strong>CargoTP</strong>
            <span>Sales dashboard</span>
          </div>
          <div class="mobile-tabs">
            <button class="tab active" data-tab="overview">Огляд</button>
            <button class="tab" data-tab="sales">Продажі</button>
            <button class="tab" data-tab="groups">План груп</button>
            <button class="tab" data-tab="receivables">Дебіторка</button>
            <button class="tab" data-tab="tires">Шини</button>
          </div>
        </div>

        <main>
          <section class="page-header">
            <div>
              <h1 id="page-title">Огляд</h1>
              <p class="muted" id="updated">Завантаження даних...</p>
            </div>
          </section>

          <div class="toolbar">
            <div class="toolbar-grid">
              <label>Місяць <select id="month"></select></label>
              <label>Пошук <input id="search" list="client-search-suggestions" placeholder="Фільтр за активним режимом..." /></label>
              <label>Валовий план місяця <input id="grossPlan" type="number" min="0" step="100" /></label>
            </div>
            <div>
              <div class="muted" style="font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;margin-bottom:8px;">Режим пошуку</div>
              <div class="mode-pills">
                <button class="mode-pill active" data-search-mode="code" type="button">Код</button>
                <button class="mode-pill" data-search-mode="client" type="button">Клієнт</button>
                <button class="mode-pill" data-search-mode="brand" type="button">Бренд</button>
                <button class="mode-pill" data-search-mode="group" type="button">Група</button>
              </div>
            </div>
          </div>
          <datalist id="client-search-suggestions"></datalist>

          <section class="section active" id="overview"></section>
          <section class="section" id="sales"></section>
          <section class="section" id="groups"></section>
          <section class="section" id="receivables"></section>
          <section class="section" id="tires"></section>
        </main>
      </div>
    </div>

    <script>
      const EXCLUDED_TIRE_GROUP = 'Автомобільна Шина';
      const AGGREGATE_PLAN_GROUP = 'Все';
      const HIGHLIGHT_GROUP_GAP_BRANDS = ['PROFIT'];
      const COLORS = ['#2563eb', '#0f766e', '#d97706', '#7c3aed', '#dc2626', '#0891b2', '#65a30d', '#ea580c'];
      let state = {
        data: null,
        month: '',
        search: '',
        searchMode: 'code',
        grossPlan: 0,
        clientSuggestions: [],
        tableSorts: {
          topClients: { key: 'turnover', dir: 'desc' },
          groupGaps: { key: 'missingPlanShare', dir: 'desc' },
          sales: { key: 'clientCode', dir: 'asc' },
          groups: { key: 'planAmount', dir: 'desc' },
          receivables: { key: 'totalDebt', dir: 'desc' },
          tires: { key: 'clientCode', dir: 'asc' }
        },
        expandedRows: {},
        tableFilters: {},
        openFilterPanel: null,
        filterPanelQuery: ''
      };
      const pageTitles = {
        overview: 'Огляд',
        sales: 'Продажі',
        groups: 'План груп',
        receivables: 'Дебіторка',
        tires: 'Шини'
      };

      const money = (value) => new Intl.NumberFormat('uk-UA', { style: 'currency', currency: 'EUR', maximumFractionDigits: 0 }).format(Number(value || 0));
      const pct = (value) => `${Number(value || 0).toFixed(1)}%`;
      const sum = (rows, get) => rows.reduce((acc, row) => acc + Number(get(row) || 0), 0);
      const avg = (rows, get) => rows.length ? sum(rows, get) / rows.length : 0;
      const monthOf = (date) => String(date || '').slice(0, 7);
      const escapeHtml = (value) => String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
      const normalizeProductGroup = (value) => String(value || '').trim().toLowerCase().replace(/ё/g, 'е').replace(/[ії]/g, 'и').replace(/\s+/g, ' ');
      const clientKey = (row) => row.clientCode || row.unifiedClientCode || row.clientName;
      function matchesSearch(row) {
        const normalizedSearch = String(state.search || '').toLowerCase().trim();
        if (!normalizedSearch) return true;
        if (state.searchMode === 'code') return `${row.clientCode || ''} ${row.unifiedClientCode || ''}`.toLowerCase().includes(normalizedSearch);
        if (state.searchMode === 'client') return `${row.clientName || ''}`.toLowerCase().includes(normalizedSearch);
        if (state.searchMode === 'brand') return `${row.brand || ''}`.toLowerCase().includes(normalizedSearch);
        return `${row.productGroup || ''}`.toLowerCase().includes(normalizedSearch);
      }
      function matchesReceivableSearch(row) {
        const normalizedSearch = String(state.search || '').toLowerCase().trim();
        if (!normalizedSearch) return true;
        if (state.searchMode === 'code') return `${row.clientCode || ''} ${row.unifiedClientCode || ''}`.toLowerCase().includes(normalizedSearch);
        if (state.searchMode === 'client') return `${row.clientName || ''}`.toLowerCase().includes(normalizedSearch);
        return true;
      }
      const isTireGroup = (value) => {
        const normalized = normalizeProductGroup(value);
        return normalized.includes('шина') || normalized.includes('шины') || normalized.includes('шин') || normalized.includes('tire') || normalized.includes('tyre');
      };
      const isGrossPlanGroup = (group) => !isTireGroup(group)
        && normalizeProductGroup(group) !== normalizeProductGroup(EXCLUDED_TIRE_GROUP)
        && normalizeProductGroup(group) !== normalizeProductGroup(AGGREGATE_PLAN_GROUP);
      const filteredSales = () => state.data.sales.filter((row) => monthOf(row.date) === state.month && matchesSearch(row));

      const byTop = (rows, getKey, getValue, limit = 10) => {
        const map = new Map();
        rows.forEach((row) => {
          const key = getKey(row) || '—';
          map.set(key, (map.get(key) || 0) + Number(getValue(row) || 0));
        });
        return [...map.entries()]
          .map(([name, value]) => ({ name, value }))
          .sort((a, b) => b.value - a.value)
          .slice(0, limit);
      };

      function topClientsByTurnover(rows, limit = 12) {
        const totalTurnover = sum(rows, (row) => row.amountEur);
        const map = new Map();
        rows.forEach((row) => {
          const key = clientKey(row);
          const entry = map.get(key) || {
            unifiedClientCode: row.unifiedClientCode,
            clientCode: row.clientCode,
            clientName: row.clientName,
            turnover: 0,
            salesCount: 0,
            groups: new Set(),
            brands: new Set()
          };
          entry.turnover += Number(row.amountEur || 0);
          entry.salesCount += 1;
          if (row.productGroup) entry.groups.add(row.productGroup);
          if (row.brand) entry.brands.add(row.brand);
          map.set(key, entry);
        });
        return [...map.values()]
          .map((row) => ({
            unifiedClientCode: row.unifiedClientCode,
            clientCode: row.clientCode,
            clientName: row.clientName,
            turnover: row.turnover,
            sharePercent: totalTurnover ? row.turnover / totalTurnover * 100 : 0,
            salesCount: row.salesCount,
            productGroups: row.groups.size,
            brands: row.brands.size
          }))
          .sort((a, b) => b.turnover - a.turnover || String(a.clientCode).localeCompare(String(b.clientCode), 'uk', { numeric: true, sensitivity: 'base' }))
          .slice(0, limit);
      }

      function collectClientSuggestions(mode = state.searchMode) {
        const values = new Set();
        if (mode === 'code') {
          [...state.data.sales, ...state.data.receivables].forEach((row) => {
            if (row.clientCode) values.add(row.clientCode);
            if (row.unifiedClientCode) values.add(row.unifiedClientCode);
          });
        }
        if (mode === 'client') [...state.data.sales, ...state.data.receivables].forEach((row) => row.clientName && values.add(row.clientName));
        if (mode === 'brand') state.data.sales.forEach((row) => row.brand && values.add(row.brand));
        if (mode === 'group') state.data.sales.forEach((row) => row.productGroup && values.add(row.productGroup));
        return [...values].sort((a, b) => a.localeCompare(b, 'uk', { numeric: true, sensitivity: 'base' })).slice(0, 300);
      }
      function syncSearchSuggestions() {
        state.clientSuggestions = collectClientSuggestions(state.searchMode);
        document.getElementById('client-search-suggestions').innerHTML = state.clientSuggestions
          .map((entry) => `<option value="${escapeHtml(entry)}"></option>`)
          .join('');
        const modeLabel = {
          code: 'кодом клієнта',
          client: 'назвою клієнта',
          brand: 'брендом',
          group: 'товарною групою'
        };
        document.getElementById('search').placeholder = `Пошук за ${modeLabel[state.searchMode]}...`;
      }

      function dailySalesSeries(rows) {
        const map = new Map();
        rows.forEach((row) => {
          const entry = map.get(row.date) || { turnover: 0, grossPlanTurnover: 0, tireTurnover: 0, clients: new Set() };
          entry.turnover += Number(row.amountEur || 0);
          if (isTireGroup(row.productGroup)) entry.tireTurnover += Number(row.amountEur || 0);
          if (isGrossPlanGroup(row.productGroup)) entry.grossPlanTurnover += Number(row.amountEur || 0);
          entry.clients.add(clientKey(row));
          map.set(row.date, entry);
        });
        return [...map.entries()]
          .sort((a, b) => a[0].localeCompare(b[0]))
          .map(([date, value]) => ({
            date,
            label: date.slice(8, 10),
            turnover: value.turnover,
            grossPlanTurnover: value.grossPlanTurnover,
            tireTurnover: value.tireTurnover,
            clients: value.clients.size
          }));
      }

      function clientGroupShareGaps(rows) {
        const relevantPlans = state.data.groupPlans
          .filter((plan) => Number(plan.planAmount || 0) > 0 && isGrossPlanGroup(plan.productGroup))
          .map((plan) => ({ ...plan, normalizedGroup: normalizeProductGroup(plan.productGroup) }));
        const totalPlanAmount = sum(relevantPlans, (plan) => plan.planAmount);
        if (!relevantPlans.length || totalPlanAmount <= 0) return [];

        const highlightedBrands = new Set(HIGHLIGHT_GROUP_GAP_BRANDS.map((brand) => normalizeProductGroup(brand)));
        const map = new Map();
        rows.forEach((row) => {
          const key = clientKey(row);
          const entry = map.get(key) || {
            unifiedClientCode: row.unifiedClientCode,
            clientCode: row.clientCode,
            clientName: row.clientName,
            turnover: 0,
            groups: new Set(),
            brands: new Set()
          };
          entry.turnover += Number(row.amountEur || 0);
          if (isGrossPlanGroup(row.productGroup)) entry.groups.add(normalizeProductGroup(row.productGroup));
          if (row.brand && highlightedBrands.has(normalizeProductGroup(row.brand))) entry.brands.add(String(row.brand).trim());
          map.set(key, entry);
        });

        return [...map.values()]
          .map((client) => {
            const coveredPlans = relevantPlans.filter((plan) => client.groups.has(plan.normalizedGroup));
            const missingPlans = relevantPlans.filter((plan) => !client.groups.has(plan.normalizedGroup));
            const coveredPlanAmount = sum(coveredPlans, (plan) => plan.planAmount);
            const missingPlanAmount = totalPlanAmount - coveredPlanAmount;
            return {
              unifiedClientCode: client.unifiedClientCode,
              clientCode: client.clientCode,
              clientName: client.clientName,
              turnover: client.turnover,
              coveredGroups: coveredPlans.length,
              coveredPlanShare: totalPlanAmount ? coveredPlanAmount / totalPlanAmount * 100 : 0,
              missingPlanShare: totalPlanAmount ? missingPlanAmount / totalPlanAmount * 100 : 0,
              missingGroups: missingPlans.length,
              coveredGroupNames: coveredPlans.map((plan) => plan.productGroup),
              coveredBrandNames: [...client.brands].sort((a, b) => a.localeCompare(b, 'uk', { sensitivity: 'base' })),
              missingGroupNames: missingPlans.map((plan) => plan.productGroup)
            };
          })
          .filter((row) => row.turnover > 0)
          .sort((a, b) => b.missingPlanShare - a.missingPlanShare || b.turnover - a.turnover);
      }

      function groupPlanRows(rows) {
        const totalPlan = sum(state.data.groupPlans, (row) => row.planAmount);
        return state.data.groupPlans.map((groupPlan) => {
          const factFromSales = sum(rows.filter((row) => normalizeProductGroup(row.productGroup) === normalizeProductGroup(groupPlan.productGroup)), (row) => row.amountEur);
          return {
            ...groupPlan,
            factFromSales,
            variance: factFromSales - groupPlan.factAmount,
            share: totalPlan ? groupPlan.planAmount / totalPlan * 100 : 0
          };
        });
      }

      function kpi(title, value, hint = '') {
        return `<article class="card kpi"><div class="label">${escapeHtml(title)}</div><div class="value">${escapeHtml(value)}</div>${hint ? `<div class="muted">${escapeHtml(hint)}</div>` : ''}</article>`;
      }

      function empty(message = 'Немає даних') {
        return `<div class="empty">${escapeHtml(message)}</div>`;
      }

      function compareValues(a, b) {
        if (typeof a === 'number' && typeof b === 'number') return a - b;
        return String(a ?? '').localeCompare(String(b ?? ''), 'uk', { numeric: true, sensitivity: 'base' });
      }

      function sortedRows(tableId, rows, columns) {
        const sort = state.tableSorts[tableId];
        if (!sort?.key) return rows;
        const column = columns.find((item) => (item.sortKey || item.key) === sort.key);
        if (!column) return rows;
        return [...rows].sort((left, right) => {
          const a = column.sortValue ? column.sortValue(left) : (column.key ? left[column.key] : '');
          const b = column.sortValue ? column.sortValue(right) : (column.key ? right[column.key] : '');
          const result = compareValues(a, b);
          return sort.dir === 'asc' ? result : -result;
        });
      }

      function filterValue(column, row) {
        if (typeof column.filterValue === 'function') return String(column.filterValue(row) ?? '');
        return String((column.key ? row[column.key] : '') ?? '');
      }

      function filteredTableRows(tableId, rows, columns) {
        const activeFilters = state.tableFilters[tableId] || {};
        const entries = Object.entries(activeFilters).filter(([, values]) => Array.isArray(values) && values.length);
        if (!entries.length) return rows;
        return rows.filter((row) => entries.every(([filterKey, values]) => {
          const column = columns.find((item) => (item.filterKey || item.key) === filterKey);
          if (!column) return true;
          return values.includes(filterValue(column, row));
        }));
      }

      function uniqueFilterOptions(rows, columns, filterKeys) {
        return Object.fromEntries(filterKeys.map((filterKey) => {
          const column = columns.find((item) => (item.filterKey || item.key) === filterKey);
          const values = column
            ? [...new Set(rows.map((row) => filterValue(column, row)).filter(Boolean))].sort((a, b) => a.localeCompare(b, 'uk', { numeric: true, sensitivity: 'base' }))
            : [];
          return [filterKey, values];
        }));
      }

      function activeTableFilters(tableId) {
        return Object.entries(state.tableFilters[tableId] || {}).flatMap(([filterKey, values]) => values.map((value) => ({ filterKey, value })));
      }

      function tableColumnTitle(columns, filterKey) {
        return columns.find((column) => (column.filterKey || column.key) === filterKey)?.title || filterKey;
      }

      function infoLabel(label, explanation) {
        return `<span class="hint-inline">${escapeHtml(label)}<span class="hint-dot" title="${escapeHtml(explanation)}">i</span></span>`;
      }

      function rowExpansionKey(tableId, rowKey) {
        return `${tableId}:${rowKey}`;
      }

      function table(tableId, rows, columns, options = {}) {
        const availableFilterOptions = options.filterOptions || uniqueFilterOptions(rows, columns, columns.map((column) => column.filterKey || column.key).filter(Boolean));
        const filtered = filteredTableRows(tableId, rows, columns);
        const currentSort = state.tableSorts[tableId] || {};
        const sorted = sortedRows(tableId, filtered, columns);
        const expandable = typeof options.expandContent === 'function';
        const activeFilters = activeTableFilters(tableId);
        if (!filtered.length) {
          return `
            ${activeFilters.length ? `
              <div class="card" style="margin-bottom:12px;">
                <div class="table-meta">
                  <div class="table-count">Показано рядків: <strong>0</strong> з ${escapeHtml(String(rows.length))}</div>
                  <button class="filter-summary-chip" data-table-filter-clear-all="${tableId}" type="button">Очистити все</button>
                </div>
                <div class="filter-summary" style="margin-top:12px;">
                  ${activeFilters.map(({ filterKey, value }) => `<button class="filter-summary-chip" data-filter-chip-remove="${tableId}" data-filter-key="${filterKey}" data-filter-value="${escapeHtml(value)}" type="button">${escapeHtml(tableColumnTitle(columns, filterKey))}: ${escapeHtml(value)}</button>`).join('')}
                </div>
              </div>
            ` : ''}
            ${empty('Немає рядків за активними фільтрами.')}
          `;
        }
        return `
          ${activeFilters.length ? `
            <div class="card" style="margin-bottom:12px;">
              <div class="table-meta">
                <div class="table-count">Показано рядків: <strong>${escapeHtml(String(filtered.length))}</strong> з ${escapeHtml(String(rows.length))}</div>
                <button class="filter-summary-chip" data-table-filter-clear-all="${tableId}" type="button">Очистити все</button>
              </div>
              <div class="filter-summary" style="margin-top:12px;">
                ${activeFilters.map(({ filterKey, value }) => `<button class="filter-summary-chip" data-filter-chip-remove="${tableId}" data-filter-key="${filterKey}" data-filter-value="${escapeHtml(value)}" type="button">${escapeHtml(tableColumnTitle(columns, filterKey))}: ${escapeHtml(value)}</button>`).join('')}
              </div>
            </div>
          ` : ''}
          <div class="table-wrap ${options.maxHeight ? 'tall' : ''}">
            <table>
              <thead>
                <tr>
                  ${columns.map((column) => {
                    const sortKey = column.sortKey || column.key;
                    const sortable = Boolean(sortKey);
                    const mark = currentSort.key === sortKey ? (currentSort.dir === 'asc' ? '▲' : '▼') : '↕';
                    const titleHtml = column.titleHtml || escapeHtml(column.title);
                    const filterKey = column.filterKey || column.key;
                    const filterOptions = availableFilterOptions[filterKey] || [];
                    const selectedCount = (state.tableFilters[tableId]?.[filterKey] || []).length;
                    const filterButton = filterOptions.length ? `
                      <button class="filter-trigger ${selectedCount ? 'active' : ''}" data-table-filter-open="${tableId}" data-filter-key="${filterKey}" type="button">
                        <span>Фільтр</span>
                        <span>${selectedCount || '▾'}</span>
                      </button>
                    ` : '';
                    const filterMenu = state.openFilterPanel?.tableId === tableId && state.openFilterPanel?.filterKey === filterKey ? `
                      <div class="filter-menu" data-table-filter-root="true">
                        <div class="filter-menu-head">
                          <span>Вибір значень</span>
                          <button class="filter-clear" data-table-filter-clear="${tableId}" data-filter-key="${filterKey}" type="button">Очистити</button>
                        </div>
                        <input data-filter-panel-search="${tableId}" placeholder="Пошук значення..." value="${escapeHtml(state.filterPanelQuery)}" />
                        <div class="filter-options">
                          ${filterOptions.filter((option) => option.toLowerCase().includes(String(state.filterPanelQuery || '').toLowerCase())).map((option) => {
                            const active = (state.tableFilters[tableId]?.[filterKey] || []).includes(option);
                            return `<button class="filter-option ${active ? 'active' : ''}" data-table-filter-option="${tableId}" data-filter-key="${filterKey}" data-filter-value="${escapeHtml(option)}" type="button">${escapeHtml(option)}</button>`;
                          }).join('') || '<div class="empty">Немає значень</div>'}
                        </div>
                      </div>
                    ` : '';
                    return `<th><div class="th-wrap">${sortable ? `<button class="th-sort" data-table-sort="${tableId}" data-sort-key="${sortKey}">${titleHtml}<span class="sort-mark">${mark}</span></button>` : titleHtml}${filterButton}</div>${filterMenu}</th>`;
                  }).join('')}
                </tr>
              </thead>
              <tbody>
                ${sorted.map((row, index) => {
                  const rowKey = options.rowKey ? options.rowKey(row, index) : String(index);
                  const expandedKey = rowExpansionKey(tableId, rowKey);
                  const expanded = Boolean(state.expandedRows[expandedKey]);
                  const cells = columns.map((column) => `<td>${column.render ? column.render(row) : escapeHtml(row[column.key] ?? '')}</td>`).join('');
                  const baseRow = `<tr class="${expandable ? 'expandable-row' : ''}" ${expandable ? `data-row-toggle="${tableId}" data-row-key="${escapeHtml(rowKey)}"` : ''}>${cells}</tr>`;
                  const extraRow = expandable && expanded ? `<tr><td colspan="${columns.length}">${options.expandContent(row)}</td></tr>` : '';
                  return `${baseRow}${extraRow}`;
                }).join('')}
              </tbody>
            </table>
          </div>
        `;
      }

      function bars(rows, valueFormatter = money) {
        if (!rows.length) return empty();
        const max = Math.max(...rows.map((row) => row.value), 1);
        return `
          <div class="card bar-list">
            ${rows.map((row) => `
              <div class="bar-row">
                <div>${escapeHtml(row.name)}</div>
                <div class="bar-bg"><div class="bar" style="width:${Math.max(3, row.value / max * 100)}%"></div></div>
                <strong>${escapeHtml(valueFormatter(row.value))}</strong>
              </div>
            `).join('')}
          </div>
        `;
      }

      function pie(rows, centerTitle) {
        if (!rows.length) return empty();
        const total = sum(rows, (row) => row.value);
        if (!total) return empty();

        let current = 0;
        const gradient = rows.map((row, index) => {
          const start = current / total * 100;
          current += row.value;
          const end = current / total * 100;
          return `${COLORS[index % COLORS.length]} ${start}% ${end}%`;
        }).join(', ');

        return `
          <div class="card pie-wrap">
            <div class="pie-chart" style="background: conic-gradient(${gradient});">
              <div class="pie-center">
                <div class="pie-center-stack">
                  <div class="pie-center-value">${escapeHtml(money(total))}</div>
                  <div class="pie-center-divider">-</div>
                  <div class="pie-center-label">${escapeHtml(centerTitle)}</div>
                </div>
              </div>
            </div>
            <div class="legend-list">
              ${rows.map((row, index) => `
                <div class="legend-item">
                  <span class="legend-dot" style="background:${COLORS[index % COLORS.length]}"></span>
                  <span>${escapeHtml(row.name)}</span>
                  <strong>${escapeHtml(pct(total ? row.value / total * 100 : 0))}</strong>
                </div>
              `).join('')}
            </div>
          </div>
        `;
      }

      function polylinePoints(rows, key, maxValue, width, height, paddingX, paddingY) {
        if (rows.length === 1) {
          const y = height - paddingY - (rows[0][key] / maxValue) * (height - paddingY * 2);
          return `${width / 2},${y} ${width / 2 + 1},${y}`;
        }
        const step = (width - paddingX * 2) / (rows.length - 1);
        return rows.map((row, index) => {
          const x = paddingX + step * index;
          const y = height - paddingY - (row[key] / maxValue) * (height - paddingY * 2);
          return `${x},${y}`;
        }).join(' ');
      }

      function dailyChart(rows) {
        if (!rows.length) return empty();
        const width = 760;
        const height = 250;
        const paddingX = 28;
        const paddingY = 24;
        const plotWidth = width - paddingX * 2;
        const plotHeight = height - paddingY * 2;
        const maxValue = Math.max(...rows.flatMap((row) => [row.turnover, row.grossPlanTurnover, row.tireTurnover]), 1);
        const step = plotWidth / rows.length;
        const barWidth = Math.max(8, step - 6);
        const grossPlanLine = polylinePoints(rows, 'grossPlanTurnover', maxValue, width, height, paddingX + step / 2, paddingY);
        const tireLine = polylinePoints(rows, 'tireTurnover', maxValue, width, height, paddingX + step / 2, paddingY);

        return `
          <div class="card chart-shell">
            <div class="chart-title">Щоденна динаміка місяця</div>
            <div class="chart-legend">
              <span><i class="legend-swatch" style="background:#2563eb"></i>Оборот</span>
              <span><i class="legend-swatch" style="background:#0f766e"></i>Оборот для валового плану</span>
              <span><i class="legend-swatch" style="background:#d97706"></i>Шини</span>
            </div>
            <svg class="line-chart" viewBox="0 0 ${width} ${height}" preserveAspectRatio="none">
              <line x1="${paddingX}" y1="${height - paddingY}" x2="${width - paddingX}" y2="${height - paddingY}" stroke="#cbd5e1" />
              <line x1="${paddingX}" y1="${paddingY}" x2="${paddingX}" y2="${height - paddingY}" stroke="#cbd5e1" />
              ${rows.map((row, index) => {
                const x = paddingX + step * index + 3;
                const barHeight = row.turnover / maxValue * plotHeight;
                const y = height - paddingY - barHeight;
                return `<rect x="${x}" y="${y}" width="${barWidth}" height="${barHeight}" rx="4" fill="#2563eb" opacity="0.75"></rect>`;
              }).join('')}
              <polyline fill="none" stroke="#0f766e" stroke-width="3" points="${grossPlanLine}"></polyline>
              <polyline fill="none" stroke="#d97706" stroke-width="3" points="${tireLine}"></polyline>
              ${rows.map((row, index) => {
                const x = paddingX + step * index + barWidth / 2 + 3;
                return `<text x="${x}" y="${height - 8}" text-anchor="middle">${escapeHtml(row.label)}</text>`;
              }).join('')}
            </svg>
          </div>
        `;
      }

      function completionClass(value) {
        return value < 95 ? 'status-red' : value <= 100 ? 'status-green' : 'status-lime';
      }

              <div class="insight"><div class="meta">Концентрація</div><div class="big">${escapeHtml(pct(topClientShare))}</div><div class="copy">Частка найбільшого клієнта у місячному обороті.</div></div>

            </div>

            <div class="two-up">

                <div class="chart-title">Топ клієнтів за оборотом</div>
                ${bars(topClientsChart)}

            </div>

            <div class="two-up">
              <div class="chart-shell">
                <div class="chart-title">Структура обороту по топ-клієнтах</div>
                ${pie(topClientsChart, 'Топ клієнти')}
              </div>
              <div class="chart-shell">
                <div class="chart-title">Структура обороту по товарних групах</div>
                ${pie(groupMix, 'Товарні групи')}
              </div>
            </div>

            <div class="section-head">
              <h2>Цільові долі груп у валовому плані</h2>
              <p class="muted">Це плановий відсоток від обороту, який мають дати групи у валовому плані.</p>
            </div>
            <div class="chart-shell">
              <div class="chart-title">Планові долі груп</div>
              ${bars(groupShareTargets, pct)}
            </div>

            <div class="section-head">
              <h2>Топ клієнтів місяця</h2>
              <p class="muted">Сортування доступне по кожній колонці. За замовчуванням таблиця відсортована за оборотом.</p>
            </div>
            ${table('topClients', topClients, [
              { title: 'Код клієнта', key: 'clientCode' },
              { title: 'Клієнт', key: 'clientName' },
              { title: 'Оборот', key: 'turnover', sortValue: (row) => row.turnover, render: (row) => money(row.turnover) },
              { title: 'Частка місяця', titleHtml: infoLabel('Частка місяця', 'Показує, яку частину всього обороту обраного місяця формує цей клієнт.'), key: 'sharePercent', sortValue: (row) => row.sharePercent, render: (row) => pct(row.sharePercent) }
            ], { maxHeight: true, rowKey: (row) => row.clientCode || row.unifiedClientCode || row.clientName })}

            <div class="section-head">
              <h2>Клієнти, які не закривають планові групи</h2>
              <p class="muted">У таблиці показані всі клієнти поточного місяця. Натисніть на рядок, щоб побачити, які групи клієнт вже робить і яких саме не вистачає до повного покриття плану.</p>
            </div>
            ${table('groupGaps', groupGaps, [
              { title: 'Код клієнта', key: 'clientCode' },
              { title: 'Клієнт', key: 'clientName' },
              { title: 'Оборот', key: 'turnover', sortValue: (row) => row.turnover, render: (row) => money(row.turnover) },
              { title: 'Робить груп', key: 'coveredGroups', sortValue: (row) => row.coveredGroups },
              { title: 'Втрачена частка', key: 'missingPlanShare', sortValue: (row) => row.missingPlanShare, render: (row) => `<span class="pill">${escapeHtml(pct(row.missingPlanShare))}</span>` },
              { title: 'Відсутніх груп', key: 'missingGroups', sortValue: (row) => row.missingGroups },
              {
                title: 'Яких груп не вистачає',
                sortKey: 'missingGroupNames',
                sortValue: (row) => row.missingGroupNames.join(', '),
                render: (row) => {
                  const value = row.missingGroupNames.join(', ');
                  const preview = value.length > 52 ? `${value.slice(0, 49)}...` : value;
                  return `<span title="${escapeHtml(value)}">${escapeHtml(preview || 'Все закрито')}</span>`;
                }
              }
            ], {
              rowKey: (row) => row.clientCode || row.unifiedClientCode || row.clientName,
              expandContent: (row) => `
                <div class="expand-card">
                  <div><strong>${escapeHtml(row.clientName)}</strong> (${escapeHtml(row.clientCode || row.unifiedClientCode || 'без коду')})</div>
                  <div class="small">Покрита частка плану: <strong>${escapeHtml(pct(row.coveredPlanShare))}</strong>. Втрачена частка: <strong>${escapeHtml(pct(row.missingPlanShare))}</strong>.</div>
                  <div class="small">Групи, які клієнт вже робить:</div>
                  <div class="chips">${[...row.coveredGroupNames, ...row.coveredBrandNames].map((name) => `<span class="chip">${escapeHtml(name)}</span>`).join('') || '<span class="chip">поки немає планових груп</span>'}</div>
                  <div class="small">Групи, яких не вистачає:</div>
                  <div class="chips">${row.missingGroupNames.map((name) => `<span class="chip">${escapeHtml(name)}</span>`).join('') || '<span class="chip">усі планові групи вже закриті</span>'}</div>
                </div>
              `
            })}
          </div>
        `;
      }

      function renderSales() {
        const rows = filteredSales();
        const salesColumns = [
          { title: 'Дата', key: 'date' },
          { title: 'Єдиний код', key: 'unifiedClientCode' },
          { title: 'Код клієнта', key: 'clientCode' },
          { title: 'Клієнт', key: 'clientName' },
          { title: 'Бренд', key: 'brand' },
          { title: 'Група', key: 'productGroup' },
          { title: 'Товар', key: 'productCode' },
          { title: 'Сума', key: 'amountEur', sortValue: (row) => row.amountEur, render: (row) => money(row.amountEur) },
          { title: 'Нетто-маржа', key: 'netMargin', sortValue: (row) => row.netMargin, render: (row) => pct(row.netMargin) },
          { title: 'Знижка', key: 'discountPercent', sortValue: (row) => row.discountPercent, render: (row) => pct(row.discountPercent) }
        ];
        const tableRows = filteredTableRows('sales', rows, salesColumns);

        document.getElementById('sales').innerHTML = `
          <div class="section-stack">
            <div class="three-up">
              <div class="chart-shell"><div class="chart-title">Топ клієнтів за оборотом</div>${bars(byTop(tableRows, (row) => row.clientName, (row) => row.amountEur, 8))}</div>
              <div class="chart-shell"><div class="chart-title">Топ брендів</div>${bars(byTop(tableRows, (row) => row.brand || 'Без бренду', (row) => row.amountEur, 8))}</div>
              <div class="chart-shell"><div class="chart-title">Топ товарних груп</div>${bars(byTop(tableRows, (row) => row.productGroup, (row) => row.amountEur, 8))}</div>
            </div>
            ${table('sales', rows, salesColumns, {
              maxHeight: true,
              rowKey: (row, index) => `${row.clientCode || row.unifiedClientCode || index}-${row.date}-${row.productCode}`
            })}
          </div>
        `;
      }

      function renderGroups() {
        const rows = groupPlanRows(filteredSales());
        document.getElementById('groups').innerHTML = `
          <div class="section-stack">
            <div class="chart-shell">
              <div class="chart-title">Групи з найбільшим фактом із продажів</div>
              ${bars(rows.map((row) => ({ name: row.productGroup, value: row.factFromSales })).sort((a, b) => b.value - a.value).slice(0, 8))}
            </div>
            ${table('groups', rows, [
              { title: 'Група', key: 'productGroup' },
              { title: 'План %', key: 'planPercent', sortValue: (row) => row.planPercent, render: (row) => pct(row.planPercent) },
              { title: 'Частка від плану', titleHtml: infoLabel('Частка від плану', 'Цільовий відсоток валового плану, який має дати ця товарна група.'), key: 'share', sortValue: (row) => row.share, render: (row) => pct(row.share) },
              { title: 'План', key: 'planAmount', sortValue: (row) => row.planAmount, render: (row) => money(row.planAmount) },
              { title: 'Факт із файлу', key: 'factAmount', sortValue: (row) => row.factAmount, render: (row) => money(row.factAmount) },
              { title: 'Факт із продажів', key: 'factFromSales', sortValue: (row) => row.factFromSales, render: (row) => money(row.factFromSales) },
              { title: 'Відхилення', key: 'variance', sortValue: (row) => row.variance, render: (row) => money(row.variance) },
              { title: '% виконання', key: 'completionPercent', sortValue: (row) => row.completionPercent, render: (row) => `<span class="${completionClass(row.completionPercent)}">${escapeHtml(pct(row.completionPercent))}</span>` }
            ], { rowKey: (row) => row.productGroup })}
          </div>
        `;
      }

      function renderReceivables() {
        const rows = state.data.receivables.filter((row) => matchesReceivableSearch(row));
        const total = sum(rows, (row) => row.totalDebt);
        const overdue = sum(rows, (row) => row.overdueDebt);
        const current = sum(rows, (row) => row.currentDebt);
        const bucket0To10 = sum(rows, (row) => row.bucket0To10);
        const bucket11To20 = sum(rows, (row) => row.bucket11To20);
        const bucket21To30 = sum(rows, (row) => row.bucket21To30);
        const bucket31Plus = sum(rows, (row) => row.bucket31Plus);
        document.getElementById('receivables').innerHTML = `
          <div class="section-stack">
            <div class="grid">
              ${kpi('Загальна дебіторка', money(total))}
              ${kpi('Прострочена', money(overdue))}
              ${kpi('Непрострочена', money(current))}
              ${kpi('Частка прострочки', pct(total ? overdue / total * 100 : 0))}
              ${kpi('0–10 днів', money(bucket0To10))}
              ${kpi('11–20 днів', money(bucket11To20))}
              ${kpi('21–30 днів', money(bucket21To30))}
              ${kpi('31+ днів', money(bucket31Plus))}
            </div>
            <div class="chart-shell">
              <div class="chart-title">Клієнти з найбільшою дебіторкою</div>
              ${bars(byTop(rows, (row) => row.clientName, (row) => row.totalDebt, 8))}
            </div>
            ${table('receivables', rows, [
              { title: 'Єдиний код', key: 'unifiedClientCode' },
              { title: 'Код клієнта', key: 'clientCode' },
              { title: 'Клієнт', key: 'clientName' },
              { title: 'Усього', key: 'totalDebt', sortValue: (row) => row.totalDebt, render: (row) => money(row.totalDebt) },
              { title: 'Непрострочена', key: 'currentDebt', sortValue: (row) => row.currentDebt, render: (row) => money(row.currentDebt) },
              { title: 'Прострочена', key: 'overdueDebt', sortValue: (row) => row.overdueDebt, render: (row) => `<span class="${row.overdueDebt ? 'danger' : 'ok'}">${escapeHtml(money(row.overdueDebt))}</span>` },
              { title: '0–10', key: 'bucket0To10', sortValue: (row) => row.bucket0To10, render: (row) => money(row.bucket0To10) },
              { title: '11–20', key: 'bucket11To20', sortValue: (row) => row.bucket11To20, render: (row) => money(row.bucket11To20) },
              { title: '21–30', key: 'bucket21To30', sortValue: (row) => row.bucket21To30, render: (row) => money(row.bucket21To30) },
              { title: '31+', key: 'bucket31Plus', sortValue: (row) => row.bucket31Plus, render: (row) => money(row.bucket31Plus) }
            ], { rowKey: (row) => row.clientCode || row.unifiedClientCode || row.clientName })}
          </div>
        `;
      }

      function renderTires() {
        const rows = filteredSales().filter((row) => isTireGroup(row.productGroup));
        const problematic = rows
          .map((sale) => ({ sale, debt: (state.data.receivables.find((row) => row.clientName === sale.clientName || row.clientCode === sale.clientCode)?.overdueDebt || 0) }))
          .filter((row) => row.debt > 0);

        document.getElementById('tires').innerHTML = `
          <div class="section-stack">
            <div class="grid">
              ${kpi('Оборот шин', money(sum(rows, (row) => row.amountEur)))}
              ${kpi('Клієнти шин', String(new Set(rows.map((row) => row.clientName)).size))}
              ${kpi('Середня маржа шин', pct(avg(rows, (row) => row.netMargin)))}
              ${kpi('Середня знижка шин', pct(avg(rows, (row) => row.discountPercent)))}
            </div>
            <div class="three-up">
              <div class="chart-shell"><div class="chart-title">Топ клієнтів по шинах</div>${bars(byTop(rows, (row) => row.clientName, (row) => row.amountEur, 8))}</div>
              <div class="chart-shell"><div class="chart-title">Топ брендів шин</div>${bars(byTop(rows, (row) => row.brand || 'Без бренду', (row) => row.amountEur, 8))}</div>
              <div class="chart-shell"><div class="chart-title">Клієнти з прострочкою</div>${bars(byTop(problematic, (row) => row.sale.clientName, (row) => row.debt, 8))}</div>
            </div>
            ${table('tires', rows, [
              { title: 'Дата', key: 'date' },
              { title: 'Єдиний код', key: 'unifiedClientCode' },
              { title: 'Код клієнта', key: 'clientCode' },
              { title: 'Клієнт', key: 'clientName' },
              { title: 'Бренд', key: 'brand' },
              { title: 'Група', key: 'productGroup' },
              { title: 'Товар', key: 'productCode' },
              { title: 'Оборот', key: 'amountEur', sortValue: (row) => row.amountEur, render: (row) => money(row.amountEur) },
              { title: 'Маржа', key: 'netMargin', sortValue: (row) => row.netMargin, render: (row) => pct(row.netMargin) },
              { title: 'Знижка', key: 'discountPercent', sortValue: (row) => row.discountPercent, render: (row) => pct(row.discountPercent) }
            ], { rowKey: (row, index) => `${row.clientCode || row.unifiedClientCode || index}-${row.date}-${row.productCode}` })}
          </div>
        `;
      }

      function renderAll() {
        renderOverview();
        renderSales();
        renderGroups();
        renderReceivables();
        renderTires();
      }

      function setActiveTab(tabId) {
        document.querySelectorAll('.tab').forEach((button) => button.classList.toggle('active', button.dataset.tab === tabId));
        document.querySelectorAll('.section').forEach((element) => element.classList.toggle('active', element.id === tabId));
        document.getElementById('page-title').textContent = pageTitles[tabId] || 'Огляд';
      }

      async function loadData() {
        try {
          const response = await fetch('data/processed/dashboard.json', { cache: 'no-store' });
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          state.data = await response.json();
        } catch (error) {
          document.getElementById('overview').innerHTML = `<div class="empty"><strong>Не вдалося завантажити data/processed/dashboard.json.</strong><br>На GitHub Pages це працює одразу. Якщо відкриваєте локально і браузер блокує file:// fetch, запустіть будь-який статичний сервер: <code>python3 -m http.server</code>.</div>`;
          document.getElementById('updated').textContent = `Помилка завантаження даних: ${error.message}`;
          return;
        }

        state.data.sales = Array.isArray(state.data.sales) ? state.data.sales : [];
        state.data.groupPlans = Array.isArray(state.data.groupPlans) ? state.data.groupPlans : [];
        state.data.receivables = Array.isArray(state.data.receivables) ? state.data.receivables : [];
        state.data.monthlyPlans = Array.isArray(state.data.monthlyPlans) ? state.data.monthlyPlans : [];
        syncSearchSuggestions();

        const months = [...new Set(state.data.sales.map((row) => monthOf(row.date)).filter((month) => /^\d{4}-\d{2}$/.test(month)))].sort().reverse();
        const expectedSource = 'data/raw/Олексієнко.xlsx';
        const sourcePattern = /^data\/raw\/Олексієнко(?:_\d{2}\.\d{2}-\d{2}\.\d{2})?\.xlsx?$/;
        const sourceFiles = state.data.meta?.sourceFiles || [];

        if (state.data.status === 'ok' && !sourceFiles.some((file) => sourcePattern.test(file))) {
          document.getElementById('updated').textContent = 'Помилка джерела даних';
          document.querySelectorAll('.section').forEach((element) => {
            element.innerHTML = `<div class="empty"><strong>Неправильне джерело істини.</strong><br>Processed JSON має будуватися тільки з <code>${expectedSource}</code> або архівного <code>Олексієнко_DD.MM-DD.MM.xlsx</code>. Зараз sourceFiles: <code>${escapeHtml(sourceFiles.join(', ') || 'не вказані')}</code>.</div>`;
          });
          return;
        }

        if (!state.data.sales.length || !months.length) {
          const message = state.data.message || 'Немає sales rows, отриманих з Excel. UI не показує demo/fallback дані.';
          document.getElementById('updated').textContent = 'Немає оброблених Excel-даних';
          document.querySelectorAll('.section').forEach((element) => {
            element.innerHTML = `<div class="empty"><strong>Немає даних з Excel.</strong><br>${escapeHtml(message)}<br><br>Додайте <code>data/raw/Олексієнко.xlsx</code> і запустіть <code>npm run process:data</code>.</div>`;
          });
          return;
        }

        state.month = months[0];
        const monthSelect = document.getElementById('month');
        monthSelect.innerHTML = months.map((month) => `<option value="${month}">${month}</option>`).join('');
        monthSelect.value = state.month;
        state.grossPlan = state.data.monthlyPlans.find((plan) => plan.month === state.month)?.grossPlan || 0;
        document.getElementById('grossPlan').value = state.grossPlan;
        document.getElementById('updated').textContent = state.data.updatedAt ? `Дані оновлено: ${new Date(state.data.updatedAt).toLocaleString('uk-UA')}` : 'Дані завантажено з Excel';
        renderAll();
      }

      document.addEventListener('click', (event) => {
        const filterOpen = event.target.closest('[data-table-filter-open]');
        if (filterOpen) {
          const tableId = filterOpen.dataset.tableFilterOpen;
          const filterKey = filterOpen.dataset.filterKey;
          state.filterPanelQuery = '';
          state.openFilterPanel = state.openFilterPanel?.tableId === tableId && state.openFilterPanel?.filterKey === filterKey
            ? null
            : { tableId, filterKey };
          renderAll();
          return;
        }

        const filterOption = event.target.closest('[data-table-filter-option]');
        if (filterOption) {
          const tableId = filterOption.dataset.tableFilterOption;
          const filterKey = filterOption.dataset.filterKey;
          const filterValue = filterOption.dataset.filterValue;
          const current = new Set(state.tableFilters[tableId]?.[filterKey] || []);
          if (current.has(filterValue)) current.delete(filterValue);
          else current.add(filterValue);
          state.tableFilters[tableId] = { ...(state.tableFilters[tableId] || {}), [filterKey]: [...current] };
          renderAll();
          return;
        }

        const filterClear = event.target.closest('[data-table-filter-clear]');
        if (filterClear) {
          const tableId = filterClear.dataset.tableFilterClear;
          const filterKey = filterClear.dataset.filterKey;
          state.tableFilters[tableId] = { ...(state.tableFilters[tableId] || {}), [filterKey]: [] };
          renderAll();
          return;
        }

        const filterClearAll = event.target.closest('[data-table-filter-clear-all]');
        if (filterClearAll) {
          const tableId = filterClearAll.dataset.tableFilterClearAll;
          state.tableFilters[tableId] = {};
          state.openFilterPanel = null;
          renderAll();
          return;
        }

        const filterChipRemove = event.target.closest('[data-filter-chip-remove]');
        if (filterChipRemove) {
          const tableId = filterChipRemove.dataset.filterChipRemove;
          const filterKey = filterChipRemove.dataset.filterKey;
          const filterValue = filterChipRemove.dataset.filterValue;
          state.tableFilters[tableId] = {
            ...(state.tableFilters[tableId] || {}),
            [filterKey]: (state.tableFilters[tableId]?.[filterKey] || []).filter((value) => value !== filterValue)
          };
          renderAll();
          return;
        }

        if (state.openFilterPanel && !event.target.closest('[data-table-filter-root="true"]')) {
          state.openFilterPanel = null;
          renderAll();
          return;
        }

        const sortButton = event.target.closest('[data-table-sort]');
        if (!sortButton) return;
        const tableId = sortButton.dataset.tableSort;
        const sortKey = sortButton.dataset.sortKey;
        const current = state.tableSorts[tableId] || {};
        state.tableSorts[tableId] = {
          key: sortKey,
          dir: current.key === sortKey && current.dir === 'asc' ? 'desc' : 'asc'
        };
        renderAll();
      });

      document.addEventListener('click', (event) => {
        const rowToggle = event.target.closest('[data-row-toggle]');
        if (!rowToggle) return;
        const tableId = rowToggle.dataset.rowToggle;
        const rowKey = rowToggle.dataset.rowKey;
        const key = rowExpansionKey(tableId, rowKey);
        state.expandedRows[key] = !state.expandedRows[key];
        renderAll();
      });

      document.querySelectorAll('.tab').forEach((button) => button.addEventListener('click', () => {
        setActiveTab(button.dataset.tab);
      }));

      document.querySelectorAll('[data-search-mode]').forEach((button) => button.addEventListener('click', () => {
        state.searchMode = button.dataset.searchMode;
        document.querySelectorAll('[data-search-mode]').forEach((item) => item.classList.remove('active'));
        button.classList.add('active');
        syncSearchSuggestions();
        renderAll();
      }));

      document.getElementById('month').addEventListener('change', (event) => {
        state.month = event.target.value;
        state.grossPlan = state.data.monthlyPlans.find((plan) => plan.month === state.month)?.grossPlan || 0;
        document.getElementById('grossPlan').value = state.grossPlan;
        renderAll();
      });
      document.getElementById('grossPlan').addEventListener('input', (event) => {
        state.grossPlan = Number(event.target.value || 0);
        renderAll();
      });
      document.getElementById('search').addEventListener('input', (event) => {
        state.search = event.target.value;
        renderAll();
      });
      document.addEventListener('input', (event) => {
        const filterInput = event.target.closest('[data-filter-panel-search]');
        if (!filterInput) return;
        state.filterPanelQuery = filterInput.value;
        renderAll();
      });

      loadData();
    </script>
  </body>
</html>
