    <script>
      const EXCLUDED_TIRE_GROUP = 'Автомобільна Шина';
      const AGGREGATE_PLAN_GROUP = 'Все';
      const HIGHLIGHT_GROUP_GAP_BRANDS = ['PROFIT'];
      const PROFIT_GROUP_NAME = 'PROFIT';
      const PROFIT_PLAN_PERCENT = 9;
      const TODO_STORAGE_KEY = 'cargotp-sales-todos-v1';
      const COLORS = ['#3b82f6', '#66c187', '#f2b84b', '#ef6b63', '#8fb4ff', '#7f8ea3', '#c4ceda', '#64748b'];
      let state = {
        data: null,
        activeTab: 'overview',
        month: '',
        search: '',
        searchMode: 'code',
        quickFocus: 'all',
        salesGroupView: 'all',
        grossPlan: 0,
        clientSuggestions: [],
        tableSorts: {
          topClients: { key: 'turnover', dir: 'desc' },
          groupGaps: { key: 'missingPlanShare', dir: 'desc' },
          sales: { key: 'clientCode', dir: 'asc' },
          salesPlanGroups: { key: 'shareDelta', dir: 'asc' },
          salesOpportunities: { key: 'missingPlanShare', dir: 'desc' },
          salesRisks: { key: 'discountPercent', dir: 'desc' },
          salesTempo: { key: 'tempoDelta', dir: 'asc' },
          groupsShare: { key: 'shareDelta', dir: 'asc' },
          groupsTempo: { key: 'tempoDelta', dir: 'asc' },
          profitClients: { key: 'hasProfit', dir: 'asc' },
          profitGroups: { key: 'penetrationPercent', dir: 'asc' },
          groups: { key: 'planAmount', dir: 'desc' },
          receivables: { key: 'totalDebt', dir: 'desc' },
          tires: { key: 'clientCode', dir: 'asc' }
        },
        expandedRows: {},
        tableFilters: {},
        openFilterPanel: null,
        filterPanelQuery: '',
        groupGapMode: 'all',
        searchSuggestionsOpen: false,
        salesTodos: [],
        salesTodoDraft: {
          title: '',
          description: '',
          clientName: '',
          dueDate: '',
          tags: '',
          priority: 'medium'
        },
        salesTodoFilters: {
          search: '',
          status: 'all',
          priority: 'all',
          tag: 'all'
        }
      };
      const pageTitles = {
        overview: 'Огляд',
        sales: 'Продажі',
        todo: 'Задачі',
        groups: 'План груп',
        receivables: 'Дебіторка',
        tires: 'Шини'
      };
      const pageKickers = {
        overview: 'Операційний зріз',
        sales: 'Робочий контур продажів',
        todo: 'Черга дій',
        groups: 'Темп груп',
        receivables: 'Платіжний контур',
        tires: 'Шинний сегмент'
      };

      const money = (value) => new Intl.NumberFormat('uk-UA', { style: 'currency', currency: 'EUR', maximumFractionDigits: 0 }).format(Number(value || 0));
      const pct = (value) => `${Number(value || 0).toFixed(1)}%`;
      const sum = (rows, get) => rows.reduce((acc, row) => acc + Number(get(row) || 0), 0);
      const avg = (rows, get) => rows.length ? sum(rows, get) / rows.length : 0;
      const shortLabel = (value, limit = 16) => {
        const label = String(value ?? '');
        return label.length > limit ? `${label.slice(0, Math.max(limit - 1, 8))}…` : label;
      };
      const monthOf = (date) => String(date || '').slice(0, 7);
      const escapeHtml = (value) => String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
      const normalizeProductGroup = (value) => String(value || '').trim().toLowerCase().replace(/ё/g, 'е').replace(/[ії]/g, 'и').replace(/\s+/g, ' ');
      const clientKey = (row) => row.clientCode || row.unifiedClientCode || row.clientName;
      const isProfitBrand = (value) => normalizeProductGroup(value) === normalizeProductGroup(PROFIT_GROUP_NAME);
      function tooltipAttrs(title, rows = []) {
        return `data-tooltip-title="${escapeHtml(title)}" data-tooltip-body="${escapeHtml(rows.join('|'))}"`;
      }
      function showChartTooltip(target, x, y) {
        const tooltip = document.getElementById('chart-tooltip');
        const title = target.dataset.tooltipTitle;
        const body = target.dataset.tooltipBody ? target.dataset.tooltipBody.split('|') : [];
        if (!title && !body.length) return;
        tooltip.innerHTML = `
          ${title ? `<div class="chart-tooltip-title">${escapeHtml(title)}</div>` : ''}
          ${body.map((row) => {
            const [label, value] = row.split('::');
            return `<div class="chart-tooltip-row"><span>${escapeHtml(label || '')}</span><strong>${escapeHtml(value || '')}</strong></div>`;
          }).join('')}
        `;
        tooltip.hidden = false;
        tooltip.classList.add('visible');
        const bounds = tooltip.getBoundingClientRect();
        tooltip.style.left = `${Math.min(x + 18, window.innerWidth - bounds.width - 14)}px`;
        tooltip.style.top = `${Math.max(14, y - bounds.height - 14)}px`;
      }
      function hideChartTooltip() {
        const tooltip = document.getElementById('chart-tooltip');
        tooltip.classList.remove('visible');
        tooltip.hidden = true;
      }
      function matchesSearch(row) {
        const normalizedSearch = String(state.search || '').toLowerCase().trim();
        if (!normalizedSearch) return true;
        if (state.searchMode === 'code') return `${row.clientCode || ''} ${row.unifiedClientCode || ''}`.toLowerCase().includes(normalizedSearch);
        if (state.searchMode === 'client') return `${row.clientName || ''}`.toLowerCase().includes(normalizedSearch);
        if (state.searchMode === 'brand') return `${row.brand || ''}`.toLowerCase().includes(normalizedSearch);
        if (normalizeProductGroup(PROFIT_GROUP_NAME).includes(normalizedSearch) && isProfitBrand(row.brand)) return true;
        return `${row.productGroup || ''}`.toLowerCase().includes(normalizedSearch);
      }
      function matchesReceivableSearch(row) {
        const normalizedSearch = String(state.search || '').toLowerCase().trim();
        if (!normalizedSearch) return true;
        if (state.searchMode === 'code') return `${row.clientCode || ''} ${row.unifiedClientCode || ''}`.toLowerCase().includes(normalizedSearch);
        if (state.searchMode === 'client') return `${row.clientName || ''}`.toLowerCase().includes(normalizedSearch);
        return false;
      }
      const isTireGroup = (value) => {
        const normalized = normalizeProductGroup(value);
        return normalized.includes('шина') || normalized.includes('шины') || normalized.includes('шин') || normalized.includes('tire') || normalized.includes('tyre');
      };
      const isGrossPlanGroup = (group) => !isTireGroup(group)
        && normalizeProductGroup(group) !== normalizeProductGroup(EXCLUDED_TIRE_GROUP)
        && normalizeProductGroup(group) !== normalizeProductGroup(AGGREGATE_PLAN_GROUP);
      function groupPlanBaseAmount() {
        const aggregatePlan = state.data.groupPlans.find((row) => normalizeProductGroup(row.productGroup) === normalizeProductGroup(AGGREGATE_PLAN_GROUP));
        if (Number(aggregatePlan?.planAmount || 0) > 0) return Number(aggregatePlan.planAmount || 0);
        return sum(state.data.groupPlans.filter((row) => Number(row.planAmount || 0) > 0 && isGrossPlanGroup(row.productGroup)), (row) => row.planAmount);
      }
      function effectiveGroupPlans() {
        const plans = state.data.groupPlans
          .filter((plan) => Number(plan.planAmount || 0) > 0 && isGrossPlanGroup(plan.productGroup))
          .map((plan) => ({ ...plan }));
        const basePlanAmount = groupPlanBaseAmount();
        if (basePlanAmount > 0) {
          plans.push({
            productGroup: PROFIT_GROUP_NAME,
            planPercent: PROFIT_PLAN_PERCENT,
            planAmount: basePlanAmount * PROFIT_PLAN_PERCENT / 100,
            tempoAmount: 0,
            factAmount: 0,
            completionPercent: 0,
            netPercent: 0
          });
        }
        return plans;
      }
      function filteredSales() {
        const baseRows = state.data.sales.filter((row) => monthOf(row.date) === state.month && matchesSearch(row));
        if (state.quickFocus === 'all') return baseRows;
        if (state.quickFocus === 'noProfit') {
          const clientsWithProfit = new Set(baseRows.filter((row) => isProfitBrand(row.brand)).map(clientKey));
          return baseRows.filter((row) => !clientsWithProfit.has(clientKey(row)));
        }
        if (state.quickFocus === 'overdue') {
          const overdueClients = new Set(state.data.receivables.filter((row) => row.overdueDebt > 0).map(clientKey));
          return baseRows.filter((row) => overdueClients.has(clientKey(row)));
        }
        if (state.quickFocus === 'riskMargin') {
          const avgMarginValue = avg(baseRows, (row) => row.netMargin);
          const avgDiscountValue = avg(baseRows, (row) => row.discountPercent);
          const discountThreshold = Math.max(avgDiscountValue, 8);
          const marginThreshold = avgMarginValue > 0 ? Math.min(avgMarginValue, PROFIT_PLAN_PERCENT + 3) : PROFIT_PLAN_PERCENT + 3;
          return baseRows.filter((row) => row.discountPercent >= discountThreshold || row.netMargin <= marginThreshold);
        }
        if (state.quickFocus === 'lagging') {
          const laggingClients = new Set(clientGroupShareGaps(baseRows).filter((row) => row.missingGroups > 0).map((row) => row.clientCode || row.unifiedClientCode || row.clientName));
          return baseRows.filter((row) => laggingClients.has(clientKey(row)));
        }
        return baseRows;
      }

      const byTop = (rows, getKey, getValue, limit = 10) => {
        const map = new Map();
        rows.forEach((row) => {
          const key = getKey(row) || '—';
          map.set(key, (map.get(key) || 0) + Number(getValue(row) || 0));
        });
        return [...map.entries()]
          .map(([name, value]) => ({ name, value }))
          .sort((a, b) => b.value - a.value)
          .slice(0, limit);
      };

      function topClientsByTurnover(rows, limit = 12) {
        const totalTurnover = sum(rows, (row) => row.amountEur);
        const map = new Map();
        rows.forEach((row) => {
          const key = clientKey(row);
          const entry = map.get(key) || {
            unifiedClientCode: row.unifiedClientCode,
            clientCode: row.clientCode,
            clientName: row.clientName,
            turnover: 0,
            salesCount: 0,
            groups: new Set(),
            brands: new Set()
          };
          entry.turnover += Number(row.amountEur || 0);
          entry.salesCount += 1;
          if (row.productGroup) entry.groups.add(row.productGroup);
          if (row.brand) entry.brands.add(row.brand);
          map.set(key, entry);
        });
        return [...map.values()]
          .map((row) => ({
            unifiedClientCode: row.unifiedClientCode,
            clientCode: row.clientCode,
            clientName: row.clientName,
            turnover: row.turnover,
            sharePercent: totalTurnover ? row.turnover / totalTurnover * 100 : 0,
            salesCount: row.salesCount,
            productGroups: row.groups.size,
            brands: row.brands.size
          }))
          .sort((a, b) => b.turnover - a.turnover || String(a.clientCode).localeCompare(String(b.clientCode), 'uk', { numeric: true, sensitivity: 'base' }))
          .slice(0, limit);
      }

      function collectClientSuggestions(mode = state.searchMode) {
        const values = new Set();
        if (mode === 'code') {
          [...state.data.sales, ...state.data.receivables].forEach((row) => {
            if (row.clientCode) values.add(row.clientCode);
            if (row.unifiedClientCode) values.add(row.unifiedClientCode);
          });
        }
        if (mode === 'client') [...state.data.sales, ...state.data.receivables].forEach((row) => row.clientName && values.add(row.clientName));
        if (mode === 'brand') state.data.sales.forEach((row) => row.brand && values.add(row.brand));
        if (mode === 'group') {
          state.data.sales.forEach((row) => {
            if (row.productGroup) values.add(row.productGroup);
            if (isProfitBrand(row.brand)) values.add(PROFIT_GROUP_NAME);
          });
        }
        return [...values].sort((a, b) => a.localeCompare(b, 'uk', { numeric: true, sensitivity: 'base' }));
      }
      function syncSearchSuggestions() {
        state.clientSuggestions = collectClientSuggestions(state.searchMode);
        const modeLabel = {
          code: 'кодом клієнта',
          client: 'назвою клієнта',
          brand: 'брендом',
          group: 'товарною групою'
        };
        document.getElementById('search').placeholder = `Пошук за ${modeLabel[state.searchMode]}...`;
        renderSearchSuggestions();
      }

      function createTodoId() {
        if (typeof crypto !== 'undefined' && typeof crypto.randomUUID === 'function') return crypto.randomUUID();
        return `todo-${Date.now()}-${Math.random().toString(36).slice(2, 8)}`;
      }

      function parseTodoTags(value) {
        return [...new Set(String(value || '').split(',').map((tag) => tag.trim()).filter(Boolean))];
      }

      function normalizeTodoDate(value) {
        if (!value) return '';
        if (/^\d{4}-\d{2}-\d{2}$/.test(String(value))) return String(value);
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return '';
        return date.toISOString().slice(0, 10);
      }

      function todoDueState(value) {
        const normalized = normalizeTodoDate(value);
        if (!normalized) return 'none';
        const now = new Date();
        const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        const due = new Date(`${normalized}T00:00:00`);
        const deltaDays = Math.round((due - today) / 86400000);
        if (deltaDays < 0) return 'overdue';
        if (deltaDays === 0) return 'today';
        return 'upcoming';
      }

      function todoDueLabel(value) {
        const normalized = normalizeTodoDate(value);
        if (!normalized) return 'Без дедлайну';
        const dueState = todoDueState(normalized);
        const formatted = new Date(`${normalized}T00:00:00`).toLocaleDateString('uk-UA', { day: '2-digit', month: '2-digit' });
        if (dueState === 'overdue') return `Прострочено · ${formatted}`;
        if (dueState === 'today') return `Сьогодні · ${formatted}`;
        return `До ${formatted}`;
      }

      function todoDueRank(value) {
        const dueState = todoDueState(value);
        if (dueState === 'overdue') return 0;
        if (dueState === 'today') return 1;
        if (dueState === 'upcoming') return 2;
        return 3;
      }

      function loadSalesTodos() {
        try {
          const raw = window.localStorage.getItem(TODO_STORAGE_KEY);
          const parsed = raw ? JSON.parse(raw) : [];
          if (!Array.isArray(parsed)) return [];
          return parsed.map((todo) => ({
            id: todo.id || createTodoId(),
            title: String(todo.title || ''),
            description: String(todo.description || ''),
            clientName: String(todo.clientName || ''),
            dueDate: normalizeTodoDate(todo.dueDate),
            tags: Array.isArray(todo.tags) ? todo.tags.filter((tag) => typeof tag === 'string') : [],
            priority: ['high', 'low'].includes(todo.priority) ? todo.priority : 'medium',
            status: ['doing', 'done'].includes(todo.status) ? todo.status : 'todo',
            createdAt: String(todo.createdAt || new Date().toISOString())
          })).filter((todo) => todo.title);
        } catch {
          return [];
        }
      }

      function saveSalesTodos() {
        window.localStorage.setItem(TODO_STORAGE_KEY, JSON.stringify(state.salesTodos));
      }

      function todoStatusLabel(status) {
        if (status === 'doing') return 'В процесі';
        if (status === 'done') return 'Готово';
        return 'До роботи';
      }

      function todoPriorityLabel(priority) {
        if (priority === 'high') return 'Високий';
        if (priority === 'low') return 'Низький';
        return 'Середній';
      }

      function todoPriorityWeight(priority) {
        if (priority === 'high') return 3;
        if (priority === 'medium') return 2;
        return 1;
      }

      function addSalesTodo(todo) {
        state.salesTodos = [
          {
            id: createTodoId(),
            title: String(todo.title || '').trim(),
            description: String(todo.description || '').trim(),
            clientName: String(todo.clientName || '').trim(),
            dueDate: normalizeTodoDate(todo.dueDate),
            tags: Array.isArray(todo.tags) ? todo.tags.filter(Boolean) : [],
            priority: ['high', 'low'].includes(todo.priority) ? todo.priority : 'medium',
            status: 'todo',
            createdAt: new Date().toISOString()
          },
          ...state.salesTodos
        ].filter((item) => item.title);
        saveSalesTodos();
      }

      function filteredSalesTodos() {
        const search = String(state.salesTodoFilters.search || '').trim().toLowerCase();
        return [...state.salesTodos]
          .filter((todo) => state.salesTodoFilters.status === 'all' || todo.status === state.salesTodoFilters.status)
          .filter((todo) => state.salesTodoFilters.priority === 'all' || todo.priority === state.salesTodoFilters.priority)
          .filter((todo) => state.salesTodoFilters.tag === 'all' || todo.tags.includes(state.salesTodoFilters.tag))
          .filter((todo) => !search || [todo.title, todo.description, todo.clientName, todo.tags.join(' ')].join(' ').toLowerCase().includes(search))
          .sort((left, right) => {
            const statusRank = { todo: 0, doing: 1, done: 2 };
            if (statusRank[left.status] !== statusRank[right.status]) return statusRank[left.status] - statusRank[right.status];
            const dueRankDelta = todoDueRank(left.dueDate) - todoDueRank(right.dueDate);
            if (dueRankDelta !== 0) return dueRankDelta;
            if (todoDueRank(left.dueDate) < 3 && todoDueRank(right.dueDate) < 3) {
              const dueDateDelta = String(left.dueDate || '').localeCompare(String(right.dueDate || ''));
              if (dueDateDelta !== 0) return dueDateDelta;
            }
            const priorityDelta = todoPriorityWeight(right.priority) - todoPriorityWeight(left.priority);
            if (priorityDelta !== 0) return priorityDelta;
            return right.createdAt.localeCompare(left.createdAt);
          });
      }

      function salesTodoTags() {
        return [...new Set(state.salesTodos.flatMap((todo) => todo.tags))].sort((a, b) => a.localeCompare(b, 'uk', { sensitivity: 'base' }));
      }

      function visibleSearchSuggestions() {
        const normalizedSearch = String(state.search || '').toLowerCase().trim();
        const filtered = normalizedSearch
          ? state.clientSuggestions.filter((entry) => entry.toLowerCase().includes(normalizedSearch))
          : state.clientSuggestions;
        return filtered;
      }

      function renderSearchSuggestions() {
        const panel = document.getElementById('search-suggestions');
        if (!state.searchSuggestionsOpen) {
          panel.hidden = true;
          panel.innerHTML = '';
          return;
        }

        const suggestions = visibleSearchSuggestions();
        if (!suggestions.length) {
          panel.hidden = true;
          panel.innerHTML = '';
          return;
        }

        panel.hidden = false;
        panel.innerHTML = `
          <div class="search-suggestions-grid">
            ${suggestions.map((entry) => `<button class="search-suggestion" data-search-suggestion="${escapeHtml(entry)}" type="button">${escapeHtml(entry)}</button>`).join('')}
          </div>
        `;
      }

      function dailySalesSeries(rows) {
        const map = new Map();
        rows.forEach((row) => {
          const entry = map.get(row.date) || { turnover: 0, grossPlanTurnover: 0, tireTurnover: 0, clients: new Set() };
          entry.turnover += Number(row.amountEur || 0);
          if (isTireGroup(row.productGroup)) entry.tireTurnover += Number(row.amountEur || 0);
          if (isGrossPlanGroup(row.productGroup)) entry.grossPlanTurnover += Number(row.amountEur || 0);
          entry.clients.add(clientKey(row));
          map.set(row.date, entry);
        });
        return [...map.entries()]
          .sort((a, b) => a[0].localeCompare(b[0]))
          .map(([date, value]) => ({
            date,
            label: date.slice(8, 10),
            turnover: value.turnover,
            grossPlanTurnover: value.grossPlanTurnover,
            tireTurnover: value.tireTurnover,
            clients: value.clients.size
          }));
      }

      function clientGroupShareGaps(rows) {
        const relevantPlans = effectiveGroupPlans()
          .map((plan) => ({ ...plan, normalizedGroup: normalizeProductGroup(plan.productGroup) }));
        const totalPlanAmount = sum(relevantPlans, (plan) => plan.planAmount);
        if (!relevantPlans.length || totalPlanAmount <= 0) return [];

        const highlightedBrands = new Set(HIGHLIGHT_GROUP_GAP_BRANDS.map((brand) => normalizeProductGroup(brand)));
        const map = new Map();
        rows.forEach((row) => {
          const key = clientKey(row);
          const entry = map.get(key) || {
            unifiedClientCode: row.unifiedClientCode,
            clientCode: row.clientCode,
            clientName: row.clientName,
            turnover: 0,
            groups: new Set(),
            brands: new Set(),
            groupAmounts: new Map(),
            brandAmounts: new Map()
          };
          entry.turnover += Number(row.amountEur || 0);
          if (isGrossPlanGroup(row.productGroup)) {
            const normalizedGroup = normalizeProductGroup(row.productGroup);
            entry.groups.add(normalizedGroup);
            const currentGroup = entry.groupAmounts.get(normalizedGroup) || { name: String(row.productGroup).trim(), amount: 0 };
            currentGroup.amount += Number(row.amountEur || 0);
            entry.groupAmounts.set(normalizedGroup, currentGroup);
          }
          if (row.brand && highlightedBrands.has(normalizeProductGroup(row.brand))) {
            const normalizedBrand = normalizeProductGroup(row.brand);
            const brandName = String(row.brand).trim();
            entry.brands.add(brandName);
            const currentBrand = entry.brandAmounts.get(normalizedBrand) || { name: brandName, amount: 0 };
            currentBrand.amount += Number(row.amountEur || 0);
            entry.brandAmounts.set(normalizedBrand, currentBrand);
          }
          if (isProfitBrand(row.brand)) {
            const normalizedProfitGroup = normalizeProductGroup(PROFIT_GROUP_NAME);
            entry.groups.add(normalizedProfitGroup);
            const currentProfit = entry.groupAmounts.get(normalizedProfitGroup) || { name: PROFIT_GROUP_NAME, amount: 0 };
            currentProfit.amount += Number(row.amountEur || 0);
            entry.groupAmounts.set(normalizedProfitGroup, currentProfit);
          }
          map.set(key, entry);
        });

        return [...map.values()]
          .map((client) => {
            const coveredPlans = relevantPlans.filter((plan) => client.groups.has(plan.normalizedGroup));
            const missingPlans = relevantPlans.filter((plan) => !client.groups.has(plan.normalizedGroup));
            const coveredPlanAmount = sum(coveredPlans, (plan) => plan.planAmount);
            const missingPlanAmount = totalPlanAmount - coveredPlanAmount;
            const coveredGroupStats = coveredPlans
              .map((plan) => {
                const fact = client.groupAmounts.get(plan.normalizedGroup);
                const amount = fact?.amount || 0;
                return {
                  name: plan.productGroup,
                  amount,
                  turnoverShare: client.turnover ? amount / client.turnover * 100 : 0,
                  planShare: normalizeProductGroup(plan.productGroup) === normalizeProductGroup(PROFIT_GROUP_NAME)
                    ? PROFIT_PLAN_PERCENT
                    : totalPlanAmount ? plan.planAmount / totalPlanAmount * 100 : 0
                };
              })
              .sort((a, b) => b.amount - a.amount || a.name.localeCompare(b.name, 'uk', { sensitivity: 'base' }));
            const coveredBrandStats = [...client.brandAmounts.values()]
              .filter((brand) => normalizeProductGroup(brand.name) !== normalizeProductGroup(PROFIT_GROUP_NAME))
              .map((brand) => ({
                name: brand.name,
                amount: brand.amount,
                turnoverShare: client.turnover ? brand.amount / client.turnover * 100 : 0
              }))
              .sort((a, b) => b.amount - a.amount || a.name.localeCompare(b.name, 'uk', { sensitivity: 'base' }));
            const missingGroupStats = missingPlans
              .map((plan) => ({
                name: plan.productGroup,
                planShare: normalizeProductGroup(plan.productGroup) === normalizeProductGroup(PROFIT_GROUP_NAME)
                  ? PROFIT_PLAN_PERCENT
                  : totalPlanAmount ? plan.planAmount / totalPlanAmount * 100 : 0
              }))
              .sort((a, b) => b.planShare - a.planShare || a.name.localeCompare(b.name, 'uk', { sensitivity: 'base' }));
            return {
              unifiedClientCode: client.unifiedClientCode,
              clientCode: client.clientCode,
              clientName: client.clientName,
              turnover: client.turnover,
              coveredGroups: coveredPlans.length,
              coveredPlanShare: totalPlanAmount ? coveredPlanAmount / totalPlanAmount * 100 : 0,
              missingPlanShare: totalPlanAmount ? missingPlanAmount / totalPlanAmount * 100 : 0,
              missingGroups: missingPlans.length,
              coveredGroupNames: coveredPlans.map((plan) => plan.productGroup),
              coveredBrandNames: coveredBrandStats.map((brand) => brand.name),
              missingGroupNames: missingPlans.map((plan) => plan.productGroup),
              coveredGroupStats,
              coveredBrandStats,
              missingGroupStats
            };
          })
          .filter((row) => row.turnover > 0)
          .sort((a, b) => b.missingPlanShare - a.missingPlanShare || b.turnover - a.turnover);
      }

      function groupPlanRows(rows) {
        const plans = effectiveGroupPlans();
        const totalPlan = sum(plans, (row) => row.planAmount);
        return plans.map((groupPlan) => {
          const factFromSales = normalizeProductGroup(groupPlan.productGroup) === normalizeProductGroup(PROFIT_GROUP_NAME)
            ? sum(rows.filter((row) => isProfitBrand(row.brand)), (row) => row.amountEur)
            : sum(rows.filter((row) => normalizeProductGroup(row.productGroup) === normalizeProductGroup(groupPlan.productGroup)), (row) => row.amountEur);
          return {
            ...groupPlan,
            factFromSales,
            variance: factFromSales - Number(groupPlan.factAmount || 0),
            share: totalPlan ? groupPlan.planAmount / totalPlan * 100 : 0,
            completionPercent: Number(groupPlan.planAmount || 0) ? factFromSales / Number(groupPlan.planAmount || 0) * 100 : 0
          };
        });
      }

      function performanceTone(value, warningFloor = -2) {
        if (value >= 0) return 'success';
        if (value >= warningFloor) return 'warning';
        return 'danger';
      }

      function planGroupShareRows(rows) {
        const totalTurnover = sum(rows, (row) => row.amountEur);
        const grossPlanTurnover = sum(rows.filter((row) => isGrossPlanGroup(row.productGroup)), (row) => row.amountEur);
        return groupPlanRows(rows)
          .filter((row) => normalizeProductGroup(row.productGroup) !== normalizeProductGroup(AGGREGATE_PLAN_GROUP))
          .map((row) => {
            const isProfitGroup = normalizeProductGroup(row.productGroup) === normalizeProductGroup(PROFIT_GROUP_NAME);
            const targetShare = isProfitGroup ? PROFIT_PLAN_PERCENT : row.share;
            const actualShare = isProfitGroup
              ? (totalTurnover ? row.factFromSales / totalTurnover * 100 : 0)
              : (grossPlanTurnover ? row.factFromSales / grossPlanTurnover * 100 : 0);
            const shareDelta = actualShare - targetShare;
            const tone = performanceTone(shareDelta);
            return {
              ...row,
              targetShare,
              actualShare,
              shareDelta,
              tone
            };
          })
          .sort((a, b) => a.shareDelta - b.shareDelta || b.planAmount - a.planAmount || a.productGroup.localeCompare(b.productGroup, 'uk', { sensitivity: 'base' }));
      }

      function planGroupBars(rows) {
        return rows
          .filter((row) => row.factFromSales > 0 || row.targetShare > 0)
          .map((row) => ({ name: row.productGroup, value: row.factFromSales }))
          .sort((a, b) => b.value - a.value || a.name.localeCompare(b.name, 'uk', { sensitivity: 'base' }));
      }

      function statusLabel(tone) {
        if (tone === 'success') return 'Ок';
        if (tone === 'warning') return 'Увага';
        return 'Ризик';
      }

      function monthProgress(referenceDate = new Date().toISOString().slice(0, 10)) {
        const [year, monthNumber] = String(state.month || '').split('-').map(Number);
        if (!year || !monthNumber) return { totalDays: 0, elapsedDays: 0, remainingDays: 0, elapsedShare: 0 };
        const totalDays = new Date(Date.UTC(year, monthNumber, 0)).getUTCDate();
        const referenceMonth = referenceDate.slice(0, 7);
        const referenceDay = Number(referenceDate.slice(8, 10)) || 0;
        const elapsedDays = referenceMonth < state.month
          ? 0
          : referenceMonth > state.month
            ? totalDays
            : Math.min(Math.max(referenceDay, 0), totalDays);
        return {
          totalDays,
          elapsedDays,
          remainingDays: Math.max(totalDays - elapsedDays, 0),
          elapsedShare: totalDays > 0 ? elapsedDays / totalDays : 0
        };
      }

      function monthPaceSnapshot(rows) {
        const actualTurnover = sum(rows.filter((row) => isGrossPlanGroup(row.productGroup)), (row) => row.amountEur);
        const grossPlan = Number(state.grossPlan || 0);
        const progress = monthProgress();
        const expectedTurnoverToDate = grossPlan * progress.elapsedShare;
        const projectedTurnover = progress.elapsedShare > 0 ? actualTurnover / progress.elapsedShare : 0;
        return {
          ...progress,
          actualTurnover,
          expectedTurnoverToDate,
          varianceToTempo: actualTurnover - expectedTurnoverToDate,
          requiredPerDay: progress.remainingDays > 0 ? Math.max(grossPlan - actualTurnover, 0) / progress.remainingDays : 0,
          projectedTurnover,
          projectedCompletionPercent: grossPlan > 0 ? projectedTurnover / grossPlan * 100 : 0
        };
      }

      function hasGrossPlan() {
        return Number(state.grossPlan || 0) > 0;
      }

      function setHeaderStat(index, label, value, copy) {
        const labelNode = document.getElementById(`header-stat-${index}-label`);
        const valueNode = document.getElementById(`header-stat-${index}-value`);
        const copyNode = document.getElementById(`header-stat-${index}-copy`);
        if (labelNode) labelNode.textContent = label;
        if (valueNode) valueNode.textContent = value;
        if (copyNode) copyNode.textContent = copy;
      }

      function updateHeaderStats(tabId = state.activeTab || 'overview') {
        if (!state.data) return;
        const sales = filteredSales();
        const receivables = state.data.receivables.filter((row) => matchesReceivableSearch(row));
        const monthPace = monthPaceSnapshot(sales);
        const grossPlanReady = hasGrossPlan();
        const overdue = sum(receivables, (row) => row.overdueDebt);
        const totalDebt = sum(receivables, (row) => row.totalDebt);
        const salesTotal = sum(sales, (row) => row.amountEur);
        const profitShare = salesTotal ? sum(sales.filter((row) => isProfitBrand(row.brand)), (row) => row.amountEur) / salesTotal * 100 : 0;
        const deficitClients = clientGroupShareGaps(sales).filter((row) => row.missingGroups > 0);
        const groupRows = groupTempoRows(sales);
        const laggingGroups = groupRows.filter((row) => row.tempoDelta < 0);
        const tireSales = sales.filter((row) => isTireGroup(row.productGroup));
        const openTodoCount = state.salesTodos.filter((todo) => todo.status !== 'done').length;
        const doneTodoCount = state.salesTodos.filter((todo) => todo.status === 'done').length;

        if (tabId === 'sales') {
          setHeaderStat(1, 'Оборот зрізу', money(salesTotal), `Фільтри застосовані до всіх блоків за ${state.month}`);
          setHeaderStat(2, 'Частка PROFIT', pct(profitShare), `Ціль: ${pct(PROFIT_PLAN_PERCENT)} · клієнтів на допродаж: ${deficitClients.length}`);
          setHeaderStat(3, 'Темп', grossPlanReady ? money(monthPace.varianceToTempo) : 'План не задано', grossPlanReady ? `Потрібно в день: ${money(monthPace.requiredPerDay)}` : 'Задайте валовий план у фільтрах');
          return;
        }
        if (tabId === 'todo') {
          setHeaderStat(1, 'Активні задачі', String(openTodoCount), `Завершено: ${doneTodoCount}`);
          setHeaderStat(2, 'Черга допродажу', String(deficitClients.length), 'Клієнтів з незакритими плановими групами');
          setHeaderStat(3, 'Тиск дебіторки', money(overdue), 'Ризики підтягуються до задач по клієнтах');
          return;
        }
        if (tabId === 'groups') {
          setHeaderStat(1, 'Групи нижче темпу', String(laggingGroups.length), `Поточний місяць: ${state.month}`);
          setHeaderStat(2, 'Найгірший розрив', laggingGroups[0] ? money(laggingGroups[0].tempoDelta) : money(0), laggingGroups[0] ? laggingGroups[0].productGroup : 'Критичного відставання не видно');
          setHeaderStat(3, 'Потрібно в день', money(sum(groupRows, (row) => row.requiredPerDay)), 'Сумарний темп для закриття плану');
          return;
        }
        if (tabId === 'receivables') {
          setHeaderStat(1, 'Прострочка', money(overdue), 'Клієнти з прострочкою потребують пріоритезації');
          setHeaderStat(2, 'Частка 31+', pct(totalDebt ? sum(receivables, (row) => row.bucket31Plus) / totalDebt * 100 : 0), 'Найважчий віковий бакет');
          setHeaderStat(3, 'Ризикові клієнти', String(receivables.filter((row) => row.overdueDebt > 0).length), 'Клієнтів з активним overdue');
          return;
        }
        if (tabId === 'tires') {
          setHeaderStat(1, 'Оборот шин', money(sum(tireSales, (row) => row.amountEur)), `Клієнтів сегмента: ${new Set(tireSales.map((row) => row.clientName)).size}`);
          setHeaderStat(2, 'Сер. маржа', pct(avg(tireSales, (row) => row.netMargin)), 'Окремий контроль сегмента шин');
          setHeaderStat(3, 'Клієнти з боргом', String(new Set(tireSales.filter((sale) => (state.data.receivables.find((row) => row.clientName === sale.clientName || row.clientCode === sale.clientCode)?.overdueDebt || 0) > 0).map((row) => row.clientName)).size), 'Шини + оплатний ризик');
          return;
        }

        setHeaderStat(1, 'Темп', grossPlanReady ? money(monthPace.varianceToTempo) : 'План не задано', grossPlanReady ? `Потрібно в день: ${money(monthPace.requiredPerDay)}` : 'Задайте валовий план у фільтрах');
        setHeaderStat(2, 'Прострочка', money(overdue), `31+ у структурі: ${pct(totalDebt ? sum(receivables, (row) => row.bucket31Plus) / totalDebt * 100 : 0)}`);
        setHeaderStat(3, 'Резерв допродажу', String(deficitClients.length), 'Клієнтів з незакритими плановими групами');
      }

      function groupTempoRows(rows) {
        const progress = monthProgress();
        return groupPlanRows(rows)
          .filter((row) => isGrossPlanGroup(row.productGroup))
          .map((row) => ({
            ...row,
            tempoDelta: row.factFromSales - Number(row.tempoAmount || 0),
            tempoCompletionPercent: Number(row.tempoAmount || 0) > 0 ? row.factFromSales / Number(row.tempoAmount || 0) * 100 : 0,
            requiredPerDay: progress.remainingDays > 0 ? Math.max(row.planAmount - row.factFromSales, 0) / progress.remainingDays : 0,
            projectedCompletionPercent: row.planAmount > 0 && progress.elapsedShare > 0 ? (row.factFromSales / progress.elapsedShare) / row.planAmount * 100 : 0
          }))
          .sort((a, b) => a.tempoDelta - b.tempoDelta || b.planAmount - a.planAmount);
      }

      function profitClientPenetration(rows, limit = 12) {
        const map = new Map();
        rows.forEach((row) => {
          const key = clientKey(row);
          const entry = map.get(key) || {
            unifiedClientCode: row.unifiedClientCode,
            clientCode: row.clientCode,
            clientName: row.clientName,
            turnover: 0,
            profitTurnover: 0,
            productGroups: new Set()
          };
          entry.turnover += Number(row.amountEur || 0);
          if (row.productGroup) entry.productGroups.add(normalizeProductGroup(row.productGroup));
          if (isProfitBrand(row.brand)) entry.profitTurnover += Number(row.amountEur || 0);
          map.set(key, entry);
        });
        return [...map.values()]
          .map((row) => ({
            unifiedClientCode: row.unifiedClientCode,
            clientCode: row.clientCode,
            clientName: row.clientName,
            turnover: row.turnover,
            profitTurnover: row.profitTurnover,
            profitShare: row.turnover > 0 ? row.profitTurnover / row.turnover * 100 : 0,
            productGroups: row.productGroups.size,
            hasProfit: row.profitTurnover > 0
          }))
          .filter((row) => row.turnover > 0)
          .sort((a, b) => Number(a.hasProfit) - Number(b.hasProfit) || b.turnover - a.turnover || String(a.clientName).localeCompare(String(b.clientName), 'uk', { sensitivity: 'base' }))
          .slice(0, limit);
      }

      function profitGroupPenetration(rows, limit = 10) {
        const profitClients = new Set(rows.filter((row) => isProfitBrand(row.brand)).map((row) => clientKey(row)));
        const map = new Map();
        rows
          .filter((row) => isGrossPlanGroup(row.productGroup))
          .forEach((row) => {
            const normalizedGroup = normalizeProductGroup(row.productGroup);
            const key = clientKey(row);
            const entry = map.get(normalizedGroup) || {
              productGroup: row.productGroup,
              turnover: 0,
              clients: new Set(),
              clientsWithProfit: new Set(),
              potentialTurnover: 0
            };
            entry.turnover += Number(row.amountEur || 0);
            entry.clients.add(key);
            if (profitClients.has(key)) entry.clientsWithProfit.add(key);
            else entry.potentialTurnover += Number(row.amountEur || 0);
            map.set(normalizedGroup, entry);
          });
        return [...map.values()]
          .map((row) => ({
            productGroup: row.productGroup,
            turnover: row.turnover,
            clients: row.clients.size,
            clientsWithProfit: row.clientsWithProfit.size,
            penetrationPercent: row.clients.size > 0 ? row.clientsWithProfit.size / row.clients.size * 100 : 0,
            potentialTurnover: row.potentialTurnover
          }))
          .sort((a, b) => a.penetrationPercent - b.penetrationPercent || b.potentialTurnover - a.potentialTurnover || String(a.productGroup).localeCompare(String(b.productGroup), 'uk', { sensitivity: 'base' }))
          .slice(0, limit);
      }

      function kpi(title, value, hint = '', tone = 'info') {
        return `<article class="card kpi ${escapeHtml(tone)}"><div class="label">${escapeHtml(title)}</div><div class="value">${escapeHtml(value)}</div>${hint ? `<div class="muted">${escapeHtml(hint)}</div>` : ''}</article>`;
      }

      function empty(message = 'Немає даних') {
        return `<div class="empty">${escapeHtml(message)}</div>`;
      }

      function compareValues(a, b) {
        if (typeof a === 'number' && typeof b === 'number') return a - b;
        return String(a ?? '').localeCompare(String(b ?? ''), 'uk', { numeric: true, sensitivity: 'base' });
      }

      function sortedRows(tableId, rows, columns) {
        const sort = state.tableSorts[tableId];
        if (!sort?.key) return rows;
        const column = columns.find((item) => (item.sortKey || item.key) === sort.key);
        if (!column) return rows;
        return [...rows].sort((left, right) => {
          const a = column.sortValue ? column.sortValue(left) : (column.key ? left[column.key] : '');
          const b = column.sortValue ? column.sortValue(right) : (column.key ? right[column.key] : '');
          const result = compareValues(a, b);
          return sort.dir === 'asc' ? result : -result;
        });
      }

      function filterValue(column, row) {
        if (typeof column.filterValue === 'function') return String(column.filterValue(row) ?? '');
        return String((column.key ? row[column.key] : '') ?? '');
      }

      function filteredTableRows(tableId, rows, columns) {
        const activeFilters = state.tableFilters[tableId] || {};
        const entries = Object.entries(activeFilters).filter(([, values]) => Array.isArray(values) && values.length);
        if (!entries.length) return rows;
        return rows.filter((row) => entries.every(([filterKey, values]) => {
          const column = columns.find((item) => (item.filterKey || item.key) === filterKey);
          if (!column) return true;
          return values.includes(filterValue(column, row));
        }));
      }

      function uniqueFilterOptions(rows, columns, filterKeys) {
        return Object.fromEntries(filterKeys.map((filterKey) => {
          const column = columns.find((item) => (item.filterKey || item.key) === filterKey);
          const values = column
            ? [...new Set(rows.map((row) => filterValue(column, row)).filter(Boolean))].sort((a, b) => a.localeCompare(b, 'uk', { numeric: true, sensitivity: 'base' }))
            : [];
          return [filterKey, values];
        }));
      }

      function activeTableFilters(tableId) {
        return Object.entries(state.tableFilters[tableId] || {}).flatMap(([filterKey, values]) => values.map((value) => ({ filterKey, value })));
      }

      function tableColumnTitle(columns, filterKey) {
        return columns.find((column) => (column.filterKey || column.key) === filterKey)?.title || filterKey;
      }

      function infoLabel(label, explanation) {
        return `<span class="hint-inline">${escapeHtml(label)}<span class="hint-dot" title="${escapeHtml(explanation)}">i</span></span>`;
      }

      function rowExpansionKey(tableId, rowKey) {
        return `${tableId}:${rowKey}`;
      }

      function resolveFilterPanelAlign(columnIndex, totalColumns) {
        if (columnIndex <= 1) return 'align-left';
        if (columnIndex >= totalColumns - 2) return 'align-right';
        return 'align-right';
      }

      function table(tableId, rows, columns, options = {}) {
        const availableFilterOptions = options.filterOptions || uniqueFilterOptions(rows, columns, columns.map((column) => column.filterKey || column.key).filter(Boolean));
        const filtered = filteredTableRows(tableId, rows, columns);
        const currentSort = state.tableSorts[tableId] || {};
        const sorted = sortedRows(tableId, filtered, columns);
        const expandable = typeof options.expandContent === 'function';
        const activeFilters = activeTableFilters(tableId);
        const openFilterKey = state.openFilterPanel?.tableId === tableId ? state.openFilterPanel.filterKey : '';
        if (!filtered.length) {
          return `
            ${activeFilters.length ? `
              <div class="card" style="margin-bottom:12px;">
                <div class="table-meta">
                  <div class="table-count">Показано рядків: <strong>0</strong> з ${escapeHtml(String(rows.length))}</div>
                  <button class="filter-summary-chip" data-table-filter-clear-all="${tableId}" type="button">Очистити все</button>
                </div>
                <div class="filter-summary" style="margin-top:12px;">
                  ${activeFilters.map(({ filterKey, value }) => `<button class="filter-summary-chip" data-filter-chip-remove="${tableId}" data-filter-key="${filterKey}" data-filter-value="${escapeHtml(value)}" type="button">${escapeHtml(tableColumnTitle(columns, filterKey))}: ${escapeHtml(value)}</button>`).join('')}
                </div>
              </div>
            ` : ''}
            ${empty('Немає рядків за активними фільтрами.')}
          `;
        }
        return `
          ${activeFilters.length ? `
            <div class="card" style="margin-bottom:12px;">
              <div class="table-meta">
                <div class="table-count">Показано рядків: <strong>${escapeHtml(String(filtered.length))}</strong> з ${escapeHtml(String(rows.length))}</div>
                <button class="filter-summary-chip" data-table-filter-clear-all="${tableId}" type="button">Очистити все</button>
              </div>
              <div class="filter-summary" style="margin-top:12px;">
                ${activeFilters.map(({ filterKey, value }) => `<button class="filter-summary-chip" data-filter-chip-remove="${tableId}" data-filter-key="${filterKey}" data-filter-value="${escapeHtml(value)}" type="button">${escapeHtml(tableColumnTitle(columns, filterKey))}: ${escapeHtml(value)}</button>`).join('')}
              </div>
            </div>
          ` : ''}
          <div class="table-wrap ${options.maxHeight ? 'tall' : ''}">
            <table>
              <thead>
                <tr>
                  ${columns.map((column, columnIndex) => {
                    const sortKey = column.sortKey || column.key;
                    const sortable = Boolean(sortKey);
                    const mark = currentSort.key === sortKey ? (currentSort.dir === 'asc' ? '▲' : '▼') : '↕';
                    const titleHtml = column.titleHtml || escapeHtml(column.title);
                    const filterKey = column.filterKey || column.key;
                    const filterOptions = availableFilterOptions[filterKey] || [];
                    const selectedCount = (state.tableFilters[tableId]?.[filterKey] || []).length;
                    const filterSideClass = resolveFilterPanelAlign(columnIndex, columns.length);
                    const filterButton = filterOptions.length ? `
                      <div style="position:relative;" data-table-filter-root="true">
                        <button class="filter-trigger ${selectedCount ? 'active' : ''}" data-table-filter-open="${tableId}" data-filter-key="${filterKey}" type="button">
                          <span>Фільтр</span>
                          <span>${selectedCount || '▾'}</span>
                        </button>
                        ${openFilterKey === filterKey ? `
                          <div class="filter-panel-wrap ${filterSideClass}">
                            <div class="filter-panel">
                              <div class="filter-menu-head">
                                <span>Вибір значень: ${escapeHtml(tableColumnTitle(columns, openFilterKey))}</span>
                                <button class="filter-clear" data-table-filter-clear="${tableId}" data-filter-key="${openFilterKey}" type="button">Очистити</button>
                              </div>
                              <input data-filter-panel-search="${tableId}" placeholder="Пошук значення..." value="${escapeHtml(state.filterPanelQuery)}" />
                              <div class="filter-options">
                                ${(availableFilterOptions[openFilterKey] || [])
                                  .filter((option) => option.toLowerCase().includes(String(state.filterPanelQuery || '').toLowerCase()))
                                  .map((option) => {
                                    const active = (state.tableFilters[tableId]?.[openFilterKey] || []).includes(option);
                                    return `<button class="filter-option ${active ? 'active' : ''}" data-table-filter-option="${tableId}" data-filter-key="${openFilterKey}" data-filter-value="${escapeHtml(option)}" type="button">${escapeHtml(option)}</button>`;
                                  }).join('') || '<div class="empty">Немає значень</div>'}
                              </div>
                            </div>
                          </div>
                        ` : ''}
                      </div>
                    ` : '';
                    return `<th><div class="th-wrap">${sortable ? `<button class="th-sort" data-table-sort="${tableId}" data-sort-key="${sortKey}">${titleHtml}<span class="sort-mark">${mark}</span></button>` : titleHtml}${filterButton}</div></th>`;
                  }).join('')}
                </tr>
              </thead>
              <tbody>
                ${sorted.map((row, index) => {
                  const rowKey = options.rowKey ? options.rowKey(row, index) : String(index);
                  const expandedKey = rowExpansionKey(tableId, rowKey);
                  const expanded = Boolean(state.expandedRows[expandedKey]);
                  const cells = columns.map((column) => `<td>${column.render ? column.render(row) : escapeHtml(row[column.key] ?? '')}</td>`).join('');
                  const baseRow = `<tr class="${expandable ? 'expandable-row' : ''}" ${expandable ? `data-row-toggle="${tableId}" data-row-key="${escapeHtml(rowKey)}"` : ''}>${cells}</tr>`;
                  const extraRow = expandable && expanded ? `<tr><td colspan="${columns.length}">${options.expandContent(row)}</td></tr>` : '';
                  return `${baseRow}${extraRow}`;
                }).join('')}
              </tbody>
            </table>
          </div>
        `;
      }

      function bars(rows, valueFormatter = money, color = 'var(--accent)') {
        if (!rows.length) return empty();
        const max = Math.max(...rows.map((row) => row.value), 1);
        const total = sum(rows, (row) => row.value);
        return `
          <div class="bar-list">
            ${rows.map((row) => `
              <div class="bar-row chart-point" ${tooltipAttrs(row.name, ['Значення::' + valueFormatter(row.value), 'Частка::' + pct(total ? row.value / total * 100 : 0)])}>
                <div title="${escapeHtml(row.name)}">${escapeHtml(shortLabel(row.name, 28))}</div>
                <div class="bar-bg"><div class="bar" style="width:${Math.max(3, row.value / max * 100)}%; background:${color};"></div></div>
                <strong>${escapeHtml(valueFormatter(row.value))}</strong>
              </div>
            `).join('')}
          </div>
        `;
      }

      function structureBars(rows, centerTitle) {
        if (!rows.length) return empty();
        const total = sum(rows, (row) => row.value);
        if (!total) return empty();

        return `
          <div class="structure-bars">
            <div class="structure-summary">
              <div>
                <div class="metric-label">${escapeHtml(centerTitle)}</div>
                <div class="metric-value">${escapeHtml(money(total))}</div>
              </div>
              <div class="metric-copy">Горизонтальні bars швидше показують різницю між групами, ніж кругова діаграма.</div>
            </div>
            <div class="bar-list">
              ${rows.map((row, index) => `
                <div class="bar-row chart-point" ${tooltipAttrs(row.name, ['Сума::' + money(row.value), 'Частка::' + pct(total ? row.value / total * 100 : 0)])}>
                  <div title="${escapeHtml(row.name)}">${escapeHtml(shortLabel(row.name, 28))}</div>
                  <div class="bar-bg"><div class="bar" style="width:${Math.max(3, row.value / Math.max(...rows.map((item) => item.value), 1) * 100)}%; background:${COLORS[index % COLORS.length]};"></div></div>
                  <strong>${escapeHtml(pct(total ? row.value / total * 100 : 0))}</strong>
                </div>
              `).join('')}
            </div>
          </div>
        `;
      }

      function polylinePoints(rows, key, maxValue, width, height, paddingX, paddingY) {
        if (rows.length === 1) {
          const y = height - paddingY - (rows[0][key] / maxValue) * (height - paddingY * 2);
          return `${width / 2},${y} ${width / 2 + 1},${y}`;
        }
        const step = (width - paddingX * 2) / (rows.length - 1);
        return rows.map((row, index) => {
          const x = paddingX + step * index;
          const y = height - paddingY - (row[key] / maxValue) * (height - paddingY * 2);
          return `${x},${y}`;
        }).join(' ');
      }

      function dailyChart(rows) {
        if (!rows.length) return empty();
        const width = 760;
        const height = 250;
        const paddingX = 28;
        const paddingY = 24;
        const plotWidth = width - paddingX * 2;
        const plotHeight = height - paddingY * 2;
        const maxValue = Math.max(...rows.flatMap((row) => [row.turnover, row.grossPlanTurnover, row.tireTurnover]), 1);
        const step = plotWidth / rows.length;
        const barWidth = Math.max(8, step - 6);
        const grossPlanLine = polylinePoints(rows, 'grossPlanTurnover', maxValue, width, height, paddingX + step / 2, paddingY);
        const tireLine = polylinePoints(rows, 'tireTurnover', maxValue, width, height, paddingX + step / 2, paddingY);

        return `
          <div class="card chart-shell">
            <div class="chart-title">Щоденна динаміка місяця</div>
            <div class="chart-legend">
              <span><i class="legend-swatch" style="background:#3b82f6"></i>Оборот</span>
              <span><i class="legend-swatch" style="background:#66c187"></i>Оборот для валового плану</span>
              <span><i class="legend-swatch" style="background:#f2b84b"></i>Шини</span>
            </div>
            <svg class="line-chart" viewBox="0 0 ${width} ${height}" preserveAspectRatio="none">
              <line x1="${paddingX}" y1="${height - paddingY}" x2="${width - paddingX}" y2="${height - paddingY}" stroke="rgba(175,167,151,0.52)" />
              <line x1="${paddingX}" y1="${paddingY}" x2="${paddingX}" y2="${height - paddingY}" stroke="rgba(175,167,151,0.52)" />
              ${rows.map((row, index) => {
                const x = paddingX + step * index + 3;
                const barHeight = row.turnover / maxValue * plotHeight;
                const y = height - paddingY - barHeight;
                return `<rect class="chart-point" ${tooltipAttrs(`День ${row.label}`, ['Оборот::' + money(row.turnover), 'Валовий план::' + money(row.grossPlanTurnover), 'Шини::' + money(row.tireTurnover), 'Клієнти::' + String(row.clients)])} x="${x}" y="${y}" width="${barWidth}" height="${barHeight}" fill="#3b82f6" opacity="0.82"></rect>`;
              }).join('')}
              <polyline fill="none" stroke="#66c187" stroke-width="3" points="${grossPlanLine}"></polyline>
              <polyline fill="none" stroke="#f2b84b" stroke-width="3" points="${tireLine}"></polyline>
              ${rows.map((row, index) => {
                const x = paddingX + step * index + barWidth / 2 + 3;
                const grossPlanY = height - paddingY - (row.grossPlanTurnover / maxValue) * (height - paddingY * 2);
                const tireY = height - paddingY - (row.tireTurnover / maxValue) * (height - paddingY * 2);
                return `
                  <circle class="chart-point" ${tooltipAttrs(`День ${row.label}`, ['Оборот для валового плану::' + money(row.grossPlanTurnover), 'Оборот::' + money(row.turnover), 'Клієнти::' + String(row.clients)])} cx="${x}" cy="${grossPlanY}" r="4" fill="#66c187"></circle>
                  <circle class="chart-point" ${tooltipAttrs(`День ${row.label}`, ['Шини::' + money(row.tireTurnover), 'Оборот::' + money(row.turnover), 'Клієнти::' + String(row.clients)])} cx="${x}" cy="${tireY}" r="4" fill="#f2b84b"></circle>
                `;
              }).join('')}
              ${rows.map((row, index) => {
                const x = paddingX + step * index + barWidth / 2 + 3;
                return `<text x="${x}" y="${height - 8}" text-anchor="middle">${escapeHtml(row.label)}</text>`;
              }).join('')}
            </svg>
          </div>
        `;
      }

      function completionClass(value) {
        return value < 95 ? 'status-red' : value <= 100 ? 'status-green' : 'status-lime';
      }

      function planTiles(rows) {
        if (!rows.length) return empty('Немає планових груп');
        return `
          <div class="plan-tile-grid">
            ${rows.map((row) => `
              <article class="plan-tile ${escapeHtml(row.tone)}">
                <div class="plan-tile-head">
                  <div class="plan-tile-title" title="${escapeHtml(row.productGroup)}">${escapeHtml(shortLabel(row.productGroup, 26))}</div>
                  <span class="plan-tile-status">${escapeHtml(statusLabel(row.tone))}</span>
                </div>
                <div class="plan-tile-metrics">
                  <div>Факт: ${escapeHtml(money(row.factFromSales))}</div>
                  <div>Частка: ${escapeHtml(pct(row.actualShare))} / ціль ${escapeHtml(pct(row.targetShare))}</div>
                </div>
                <div class="plan-tile-delta ${row.tone === 'success' ? 'ok' : row.tone === 'warning' ? 'tone-warning' : 'danger'}">${escapeHtml(row.shareDelta >= 0 ? `+${pct(row.shareDelta)}` : pct(row.shareDelta))}</div>
                <div class="plan-tile-progress"><span style="width:${Math.min(Math.max(row.actualShare / Math.max(row.targetShare, 0.001) * 100, 4), 100)}%"></span></div>
              </article>
            `).join('')}
          </div>
        `;
      }

      function renderOverview() {
        const sales = filteredSales();
        const visibleClientKeys = new Set(sales.map((row) => row.clientCode || row.unifiedClientCode || row.clientName));
        const receivables = state.data.receivables.filter((row) => {
          if (state.searchMode === 'brand' || state.searchMode === 'group') {
            return !state.search || visibleClientKeys.has(row.clientCode || row.unifiedClientCode || row.clientName);
          }
          return matchesReceivableSearch(row);
        });
        const total = sum(sales, (row) => row.amountEur);
        const planTurnover = sum(sales.filter((row) => isGrossPlanGroup(row.productGroup)), (row) => row.amountEur);
        const grossPlan = Number(state.grossPlan || 0);
        const topClients = topClientsByTurnover(sales, 12);
        const topClientsChart = topClients.slice(0, 8).map((row) => ({ name: row.clientName, value: row.turnover }));
        const groupGaps = clientGroupShareGaps(sales);
        const visibleGroupGaps = state.groupGapMode === 'deficit' ? groupGaps.filter((row) => row.missingGroups > 0) : groupGaps;
        const daily = dailySalesSeries(sales);
        const planShareRows = planGroupShareRows(sales);
        const planShareHighlights = [...planShareRows]
          .sort((a, b) => {
            const severityDelta = Math.abs(b.shareDelta) - Math.abs(a.shareDelta);
            return severityDelta || b.planAmount - a.planAmount || a.productGroup.localeCompare(b.productGroup, 'uk', { sensitivity: 'base' });
          })
          .slice(0, 12);
        const activeClients = new Set(sales.map((row) => row.clientCode || row.unifiedClientCode || row.clientName)).size;
        const avgDailyTurnover = daily.length ? avg(daily, (row) => row.turnover) : 0;
        const topOverdueClients = byTop(receivables.filter((row) => row.overdueDebt > 0), (row) => row.clientName, (row) => row.overdueDebt, 8);
        const totalDebt = sum(receivables, (row) => row.totalDebt);
        const bucket31Plus = sum(receivables, (row) => row.bucket31Plus);
        const share31Plus = totalDebt ? bucket31Plus / totalDebt * 100 : 0;
        const profitTurnover = sum(sales.filter((row) => isProfitBrand(row.brand)), (row) => row.amountEur);
        const profitShare = total ? profitTurnover / total * 100 : 0;
        const profitGap = Math.max(PROFIT_PLAN_PERCENT - profitShare, 0);
        const completion = grossPlan ? planTurnover / grossPlan * 100 : 0;
        const grossPlanReady = hasGrossPlan();
        const completionTone = completion >= 100 ? 'success' : completion >= 85 ? 'warning' : 'danger';
        const debtTone = sum(receivables, (row) => row.overdueDebt) > 0 ? 'danger' : 'success';
        const pace = monthPaceSnapshot(sales);
        const topGapClient = visibleGroupGaps.find((row) => row.missingGroups > 0);
        const strongestActionItems = [
          {
            label: 'Темп місяця',

              : 'Задайте валовий план, щоб увімкнути порівняння темпу.',
            tone: grossPlanReady ? (pace.varianceToTempo >= 0 ? 'tone-success' : 'tone-warning') : 'tone-info'
          },
          {
            label: 'Найбільша прострочка',
            value: topOverdueClients[0] ? money(topOverdueClients[0].value) : money(0),
            copy: topOverdueClients[0] ? `${topOverdueClients[0].name} найбільше тисне на оплату.` : 'Критичної прострочки не видно.',
            tone: topOverdueClients[0] ? 'tone-danger' : 'tone-success'
          },
          {
            label: 'Перший хід допродажу',
            value: topGapClient ? pct(topGapClient.missingPlanShare) : pct(0),
            copy: topGapClient ? `${topGapClient.clientName} має найбільший резерв.` : 'Явного дефіциту по групах немає.',
            tone: topGapClient ? 'tone-info' : 'tone-success'
          }
        ];

        document.getElementById('overview').innerHTML = `
          <div class="section-stack">
            <section class="overview-hero">
              <div class="hero-panel">
                <div class="hero-head">
                  <div>
                    <div class="hero-kicker">Стан місяця</div>
                    <div class="hero-title">Темп, план і перша точка тиску</div>
                    <div class="hero-copy">Швидкий зріз без декоративного шуму.</div>
                  </div>
                  <div class="hero-chip">${escapeHtml(state.month)}</div>
                </div>
                <div class="hero-grid">
                  <div class="hero-stat">
                    <div class="hero-stat-label">Факт проти темпу</div>
                    <div class="hero-stat-value ${grossPlanReady ? (pace.varianceToTempo >= 0 ? 'tone-success' : 'tone-warning') : 'tone-info'}">${escapeHtml(grossPlanReady ? money(pace.varianceToTempo) : 'План не задано')}</div>
                    <div class="hero-stat-copy">${grossPlanReady ? `Очікувалось на поточну дату: ${money(pace.expectedTurnoverToDate)}` : 'Без валового плану порівняння темпу не показується.'}</div>
                  </div>
                  <div class="hero-stat">
                    <div class="hero-stat-label">Потрібно в день</div>
                    <div class="hero-stat-value">${escapeHtml(grossPlanReady ? money(pace.requiredPerDay) : '—')}</div>
                    <div class="hero-stat-copy">${grossPlanReady ? `Щоб закрити валовий план ${money(grossPlan)}` : 'Після задання плану тут з’явиться потрібний добовий темп.'}</div>
                  </div>
                  <div class="hero-stat">
                    <div class="hero-stat-label">Прогноз закриття</div>
                    <div class="hero-stat-value ${grossPlanReady ? (pace.projectedCompletionPercent >= 100 ? 'tone-success' : pace.projectedCompletionPercent >= 85 ? 'tone-warning' : 'tone-danger') : 'tone-info'}">${escapeHtml(grossPlanReady ? pct(pace.projectedCompletionPercent) : '—')}</div>
                    <div class="hero-stat-copy">${grossPlanReady ? 'На основі поточного темпу місяця' : 'Прогноз стане доступним після задання плану.'}</div>
                  </div>
                </div>
              </div>
              <aside class="action-panel">
                <div class="action-head">
                  <div>
                    <div class="action-kicker">Пріоритет</div>
                    <div class="action-title">Що варто робити далі</div>
                    <div class="action-copy">Три дії, які зараз реально рухають місяць.</div>
                  </div>
                </div>
                <div class="action-stack">
                  ${strongestActionItems.map((item) => `
                    <div class="action-item">
                      <div class="action-item-meta">
                        <div class="action-item-label">${escapeHtml(item.label)}</div>
                        <div class="action-item-value ${escapeHtml(item.tone)}">${escapeHtml(item.value)}</div>
                      </div>
                      <div class="action-item-copy">${escapeHtml(item.copy)}</div>
                    </div>
                  `).join('')}
                </div>
              </aside>

            <div class="grid overview-kpis">
              ${kpi('Загальний оборот', money(total), `Валовий оборот за ${state.month}`, 'info')}
              ${kpi('Виконання валового плану', grossPlanReady ? pct(completion) : 'План не задано', grossPlanReady ? `Планова база: ${money(planTurnover)} з планом ${money(grossPlan)}` : 'Задайте валовий план місяця у фільтрах', grossPlanReady ? completionTone : 'secondary')}
              ${kpi('Темп місяця', grossPlanReady ? money(pace.varianceToTempo) : 'План не задано', grossPlanReady ? `Очікувалось на зараз: ${money(pace.expectedTurnoverToDate)}` : 'Без плану не показуємо відхилення темпу', grossPlanReady ? (pace.varianceToTempo >= 0 ? 'success' : 'warning') : 'secondary')}
              ${kpi('Прострочена дебіторка', money(sum(receivables, (row) => row.overdueDebt)), `31+ днів: ${pct(share31Plus)} від усієї дебіторки`, debtTone)}
              ${kpi('Частка PROFIT', pct(profitShare), profitGap > 0 ? `До цілі бракує ${pct(profitGap)}` : `Ціль ${pct(PROFIT_PLAN_PERCENT)} виконана`, profitGap > 0 ? 'warning' : 'success')}
            </div>

            <div class="two-up">
              ${dailyChart(daily)}
              <div class="chart-shell">
                <div class="chart-title">Топ клієнтів за оборотом</div>
                ${bars(topClientsChart)}

        const total = sum(tableRows, (row) => row.amountEur);
        const planTurnover = sum(tableRows.filter((row) => isGrossPlanGroup(row.productGroup)), (row) => row.amountEur);
        const grossPlan = Number(state.grossPlan || 0);
        const grossPlanReady = hasGrossPlan();
        const completion = grossPlan ? planTurnover / grossPlan * 100 : 0;
        const monthPace = monthPaceSnapshot(tableRows);
        const profitTurnover = sum(tableRows.filter((row) => isProfitBrand(row.brand)), (row) => row.amountEur);
        const profitShare = total ? profitTurnover / total * 100 : 0;
        const profitGap = Math.max(PROFIT_PLAN_PERCENT - profitShare, 0);
        const avgMarginValue = avg(tableRows, (row) => row.netMargin);
        const avgDiscountValue = avg(tableRows, (row) => row.discountPercent);
        const discountThreshold = Math.max(avgDiscountValue, 8);
        const marginThreshold = avgMarginValue > 0 ? Math.min(avgMarginValue, PROFIT_PLAN_PERCENT + 3) : PROFIT_PLAN_PERCENT + 3;
        const concentrationShare = total ? topClientsByTurnover(tableRows, 3).reduce((sumValue, row) => sumValue + row.turnover, 0) / total * 100 : 0;
        const deficitClients = clientGroupShareGaps(tableRows).filter((row) => row.missingGroups > 0);
        const riskyRows = [...tableRows]
          .filter((row) => row.discountPercent >= discountThreshold || row.netMargin <= marginThreshold)
